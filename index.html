// =========================================================
// BATTLE SCREEN (visual demo of a chess game)
// =========================================================
// Map aiHook to Engine difficulty level (0=random, 1=easy, 2=med, 3=hard, 4=expert, 5=master)
function hookToLevel(hook) {
  const map = {
    easy: 0, fast: 1, tonic: 2, balanced: 2, aggressive: 2,
    classical: 3, positional: 3, tactical: 3, machine: 5, universal: 5
  };
  return map[hook] ?? 2;
}

function pairMoves(history) {
  const pairs = [];
  for (let i = 0; i < history.length; i += 2)
    pairs.push([history[i].san, history[i + 1] ? history[i + 1].san : null]);
  return pairs;
}

function randomQuote(opp) {
  const phrases = [opp.quote,
    "Interesting choice.", "I have seen this before.", "A bold move.",
    "Hmm.", "Don't trust me. Trust the position.",
    "You can do better than that.", "The center is mine now."];
  return phrases[Math.floor(Math.random() * phrases.length)];
}

function Battle({ opp, player, onFinish, onBack }) {
  const E = window.Engine;
  const aiLevel = hookToLevel(opp.aiHook);

  const [game, setGame] = React.useState(() => E.newGame());
  const [sel, setSel] = React.useState(null);
  const [hints, setHints] = React.useState([]);
  const [lastMove, setLastMove] = React.useState(null); // [fromSq, toSq]
  const [thinking, setThinking] = React.useState(false);
  const [over, setOver] = React.useState(null);
  const [pendingPromo, setPendingPromo] = React.useState(null);
  const [quote, setQuote] = React.useState(opp.quote);
  const logRef = React.useRef(null);

  // Player always plays white in story mode
  const playerColor = 'w';

  React.useEffect(() => {
    if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [game.history.length]);

  // Get opponent's book move (if still in opening)
  function getBookMove(g) {
    const book = (window.OPP_BOOK || {})[opp.id];
    if (!book) return null;
    const h = g.history;
    // Determine which book line to use based on white's first move
    const white1 = h.length > 0 ? h[0].san : null;
    const line = white1 === 'e4' ? book.vs_e4 : white1 === 'd4' ? book.vs_d4 : book.vs_e4;
    if (!line) return null;
    // Black plays at history indices 1,3,5,7... → line index 0,1,2,3...
    const blackMoveN = Math.floor(h.length / 2); // 0-based black move count
    const bookEntry = line[blackMoveN];
    if (!bookEntry) return null;
    const from = bookEntry.slice(0, 2);
    const to = bookEntry.slice(2, 4);
    // Verify it's a legal move before playing
    const legal = E.moves(g);
    const valid = legal.find(m =>
      E.rcToSq(m.from[0], m.from[1]) === from &&
      E.rcToSq(m.to[0], m.to[1]) === to
    );
    return valid ? { from, to } : null;
  }

  // Evaluate-aware quotes
  function getContextQuote(before, after) {
    const eval_b = evalPos(before);
    const eval_a = evalPos(after);
    const delta = eval_a - eval_b; // positive = good for player (white)
    if (delta > 150) {
      const good = [`"Good move, ${player?.name || 'friend'}."`, `"Interesting."`, `"I see what you're doing."`, `"Hmm."`];
      return good[Math.floor(Math.random() * good.length)];
    }
    if (delta < -150) {
      const bad = [`"${opp.quote}"`, `"There it is."`, `"Are you sure about that?"`, `"A gift."`];
      return bad[Math.floor(Math.random() * bad.length)];
    }
    if (Math.random() < 0.18) return randomQuote(opp);
    return null;
  }

  function evalPos(g) {
    // Simple material count for quote context
    const vals = {p:1,n:3,b:3,r:5,q:9,k:0};
    let score = 0;
    for (let r=0;r<8;r++) for (let co=0;co<8;co++) {
      const p=g.board[r][co]; if(p==='.') continue;
      const v=vals[p.toLowerCase()]||0;
      score += p===p.toUpperCase() ? v : -v;
    }
    return score * 100;
  }

  function finishMove(after) {
    setSel(null); setHints([]);
    // Track last move for highlight
    const lastMv = after.history[after.history.length - 1];
    if (lastMv) setLastMove([E.rcToSq(lastMv.from[0], lastMv.from[1]), E.rcToSq(lastMv.to[0], lastMv.to[1])]);

    const status = E.isGameOver(after);
    if (status.over) {
      setGame(after); setOver(status);
      const outcome = status.result === '1-0' ? 'win' : status.result === '0-1' ? 'loss' : 'draw';
      onFinish({ outcome, moves: after.history.length });
      return;
    }
    // AI turn
    setThinking(true);
    setGame(after);
    setTimeout(() => {
      // Try book move first, then AI
      const bookMv = getBookMove(after);
      let mv, afterAI;
      if (bookMv) {
        afterAI = E.makeMove(after, bookMv.from, bookMv.to);
      }
      if (!afterAI) {
        mv = E.aiMove(after, aiLevel);
        if (!mv) { setThinking(false); return; }
        afterAI = E.applyMove(after, mv);
      }
      // Update last move for AI
      const aiLastMv = afterAI.history[afterAI.history.length - 1];
      if (aiLastMv) setLastMove([E.rcToSq(aiLastMv.from[0], aiLastMv.from[1]), E.rcToSq(aiLastMv.to[0], aiLastMv.to[1])]);
      // Contextual quote
      const q = getContextQuote(after, afterAI);
      if (q) setQuote(q);
      setGame(afterAI);
      setThinking(false);
      const s2 = E.isGameOver(afterAI);
      if (s2.over) {
        setOver(s2);
        const outcome = s2.result === '1-0' ? 'win' : s2.result === '0-1' ? 'loss' : 'draw';
        onFinish({ outcome, moves: afterAI.history.length });
      }
    }, 250 + Math.random() * 450);
  }

  function onSquare(sq) {
    if (thinking || over || game.turn !== playerColor) return;
    const [r, c] = E.sqToRc(sq);
    const piece = game.board[r][c];
    const isOwn = piece !== '.' && piece === piece.toUpperCase();

    if (sel) {
      const hit = hints.find(h => h.sq === sq);
      if (hit) {
        if (hit.promo) { setPendingPromo({ from: sel, to: sq }); return; }
        const after = E.makeMove(game, sel, sq);
        if (after) finishMove(after);
      } else if (isOwn) {
        setSel(sq);
        setHints(E.moves(game, sq).map(m => ({ sq: E.rcToSq(m.to[0], m.to[1]), capture: m.capture, promo: m.promo })));
      } else { setSel(null); setHints([]); }
    } else if (isOwn) {
      setSel(sq);
      setHints(E.moves(game, sq).map(m => ({ sq: E.rcToSq(m.to[0], m.to[1]), capture: m.capture, promo: m.promo })));
    }
  }

  function completePromo(piece) {
    if (!pendingPromo) return;
    const after = E.makeMove(game, pendingPromo.from, pendingPromo.to, piece);
    setPendingPromo(null);
    if (after) finishMove(after);
  }

  const checked = E.isCheck(game) && !over;
  const turnLabel = over ? (over.reason === 'checkmate' ? 'Checkmate!' : over.reason === 'stalemate' ? 'Stalemate — draw' : 'Draw')
    : thinking ? `${opp.name} is thinking…`
    : game.turn === playerColor ? (checked ? '⚠ Check! Your turn' : 'Your turn') : `${opp.name}'s turn`;

  const pairs = pairMoves(game.history);

  return (
    <div>
      <div style={{ padding: '16px 16px 0', maxWidth: 1400, margin: '0 auto' }}>
        <BackBtn onClick={() => { if (window.confirm('Retreat? The game will be lost.')) onBack(); }} label="Retreat" />
      </div>
      <div className="battle">
        {/* Left: opponent + notation */}
        <div className="battle-side">
          <div className="opp-banner">
            <div className="ob-portrait"><Portrait data={opp} /></div>
            <div>
              <div className="ob-name">{opp.name}</div>
              <div className="ob-sub">{opp.title} · Elo {opp.elo}</div>
            </div>
          </div>
          <div className="move-log" ref={logRef}>
            <h4>Notation</h4>
            {pairs.length === 0 && <div style={{ color:'var(--ink-mute)', fontStyle:'italic', fontSize: 13, fontFamily:'var(--f-display)' }}>No moves yet.</div>}
            {pairs.map((pair, i) => (
              <div key={i} className="move-row">
                <span className="n">{i+1}.</span>
                <span className="m">{pair[0]}</span>
                <span className="m">{pair[1] || ''}</span>
              </div>
            ))}
          </div>
          <div className="battle-quote">"{quote}"</div>
        </div>

        {/* Center: board — with opponent bar on mobile */}
        <div className="battle-board">
          {/* Opponent bar — visible on mobile above board */}
          <div className="battle-opp-bar">
            <div className="bop-portrait"><Portrait data={opp} /></div>
            <div>
              <div className="bop-name">{opp.name}</div>
              <div className="bop-sub">{opp.title} · Elo {opp.elo}</div>
            </div>
            <div className={`bop-status ${thinking?'thinking':checked?'check':''}`}>
              {thinking ? '⏳ thinking' : checked ? '⚠ check' : game.turn !== playerColor ? 'their turn' : ''}
            </div>
          </div>
          <ChessBoard position={game.board} selected={sel} hints={hints} lastMove={lastMove} onSquare={onSquare} theme="cinematic" />
          <div className="opp-banner" style={{ marginTop: 16, marginBottom: 0 }}>
            <div className="ob-portrait" style={{ borderColor: 'var(--ink-mute)', overflow:'hidden' }}>
              <ChessPieceAvatar kind={player?.avatar?.piece || 'pawn'} palette={player?.avatar?.palette || 'ivory'} />
            </div>
            <div>
              <div className="ob-name">{player?.name || 'You'}</div>
              <div className="ob-sub">{titleForElo(player?.elo || 600)} · Elo {player?.elo || 600}</div>
            </div>
          </div>
          <div style={{ textAlign:'center', marginTop: 10, color: checked ? 'var(--crimson)' : over ? 'var(--accent)' : thinking ? 'var(--ink-mute)' : 'var(--ink-soft)', fontFamily:'var(--f-mono)', fontSize: 11, letterSpacing:'0.16em', textTransform:'uppercase', transition:'color 0.3s' }}>
            {turnLabel}
          </div>
        </div>

        {/* Right: info + resign */}
        <div className="battle-aux">
          <div className="card tight">
            <Eyebrow accent>Opponent</Eyebrow>
            <div style={{ fontFamily:'var(--f-display)', fontStyle:'italic', fontSize: 14, color:'var(--ink-soft)', marginTop: 6, lineHeight: 1.55 }}>{opp.style}</div>
          </div>
          <div className="card tight" style={{ marginTop: 12 }}>
            <div style={{ display:'flex', flexDirection:'column', gap: 8 }}>
              <button className="btn ghost sm" onClick={() => { if (window.confirm('Resign this game?')) onFinish({ outcome: 'loss', moves: game.history.length }); }}>Resign</button>
            </div>
          </div>
        </div>
      </div>

      {/* Promotion picker */}
      {pendingPromo && (
        <div className="cutscene" onClick={() => setPendingPromo(null)}>
          <div onClick={e => e.stopPropagation()} style={{ background:'var(--bg-elev)', padding: 32, borderRadius: 18, border:'1px solid var(--rule)', maxWidth: 360, textAlign:'center' }}>
            <Eyebrow accent>Promotion</Eyebrow>
            <h2 className="display" style={{ fontSize: 24, marginTop: 6 }}>Choose a piece</h2>
            <div style={{ display:'flex', gap: 12, justifyContent:'center', marginTop: 20 }}>
              {["q","r","b","n"].map(p => (
                <button key={p} className="btn ghost" onClick={() => completePromo(p)} style={{ width: 60, height: 60, fontSize: 32 }}>
                  {window.PIECE_GLYPHS[p.toUpperCase()]}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

  const b = getDrillBests();
  if (b[id] === undefined || score > b[id]) {

}

  <script type="text/babel" data-presets="react">/* global React, Engine, ChessBoard, BackBtn, Eyebrow */

// =========================================================
// FUNCTIONAL PLAY SCREEN — real game vs engine
// =========================================================

function PlayScreen({ onBack }) {
  const [diff, setDiff] = React.useState("medium");
  const [playerSide, setPlayerSide] = React.useState("white");
  const [game, setGame] = React.useState(null);
  const [sel, setSel] = React.useState(null);
  const [hints, setHints] = React.useState([]);
  const [thinking, setThinking] = React.useState(false);
  const [over, setOver] = React.useState(null);
  const [pendingPromo, setPendingPromo] = React.useState(null);

  const diffs = [
    { id: "novice", name: "Novice", level: 0, elo: "~400", desc: "Random legal moves. Friendly first game." },
    { id: "easy",   name: "Easy",   level: 1, elo: "~700", desc: "Sometimes blunders, sometimes plans." },
    { id: "medium", name: "Medium", level: 2, elo: "~1000", desc: "Knows tactics, watches for captures." },
    { id: "hard",   name: "Hard",   level: 3, elo: "~1300", desc: "Two moves ahead. No free pieces." },
    { id: "expert", name: "Expert", level: 4, elo: "~1550", desc: "Strong tactical sight." },
    { id: "master", name: "Master", level: 5, elo: "~1700", desc: "Three moves deep. Plays for position." }
  ];

  function start() {
    const g = Engine.newGame();
    setGame(g);
    setSel(null); setHints([]); setOver(null);
    if (playerSide === "black") {
      // engine plays as white first
      setTimeout(() => engineTurn(g, diffs.find(d => d.id === diff).level), 350);
    }
  }

  function engineTurn(g, level) {
    setThinking(true);
    setTimeout(() => {
      const mv = Engine.aiMove(g, level);
      if (!mv) { setThinking(false); return; }
      const after = Engine.applyMove(g, mv);
      setGame(after);
      setThinking(false);
      const status = Engine.isGameOver(after);
      if (status.over) setOver(status);
    }, 200);
  }

  function onSquare(sq) {
    if (!game || over || thinking) return;
    const playerColor = playerSide === "white" ? "w" : "b";
    if (game.turn !== playerColor) return;
    const [r, c] = Engine.sqToRc(sq);
    const piece = game.board[r][c];
    const isOwn = piece !== "." && (playerColor === "w" ? piece === piece.toUpperCase() : piece === piece.toLowerCase());

    // clicked own piece → select
    if (isOwn) {
      setSel(sq);
      const legal = Engine.moves(game, sq);
      setHints(legal.map(m => ({ sq: Engine.rcToSq(m.to[0], m.to[1]), capture: m.capture, promo: m.promo })));
      return;
    }
    // clicked target square
    if (sel && hints.find(h => h.sq === sq)) {
      const hit = hints.find(h => h.sq === sq);
      if (hit.promo) {
        setPendingPromo({ from: sel, to: sq });
        return;
      }
      const after = Engine.makeMove(game, sel, sq);
      if (!after) return;
      setGame(after); setSel(null); setHints([]);
      const status = Engine.isGameOver(after);
      if (status.over) { setOver(status); return; }
      engineTurn(after, diffs.find(d => d.id === diff).level);
    } else {
      setSel(null); setHints([]);
    }
  }

  function completePromo(piece) {
    if (!pendingPromo) return;
    const after = Engine.makeMove(game, pendingPromo.from, pendingPromo.to, piece);
    setPendingPromo(null);
    if (!after) return;
    setGame(after); setSel(null); setHints([]);
    const status = Engine.isGameOver(after);
    if (status.over) { setOver(status); return; }
    engineTurn(after, diffs.find(d => d.id === diff).level);
  }

  function resign() {
    setOver({ over: true, result: playerSide === "white" ? "0-1" : "1-0", reason: "resignation" });
  }
  function newGame() { setGame(null); setOver(null); setSel(null); setHints([]); }

  if (!game) {
    return (
      <div className="page narrow">
        <BackBtn onClick={onBack} />
        <Eyebrow accent>Free Play</Eyebrow>
        <h1 className="display" style={{ fontSize: 44, margin: '12px 0 8px' }}>Pick your hour.</h1>
        <p style={{ color: 'var(--ink-soft)', fontStyle: 'italic', fontFamily:'var(--f-display)', fontSize: 18, marginBottom: 32 }}>
          Six difficulties from a friendly first game to a real fight.
        </p>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))', gap: 12 }}>
          {diffs.map(d => (
            <button key={d.id} className="mode-card" onClick={() => setDiff(d.id)}
              style={{ minHeight: 160, borderColor: diff === d.id ? 'var(--ink)' : undefined }}>

                <div className="mode-desc">{d.desc}</div>

        <div style={{ display:'flex', justifyContent:'center', marginTop: 28, gap: 8, flexWrap:'wrap' }}>
          {[
            { id: "white", label: "Play as White" },
            { id: "black", label: "Play as Black" },
            { id: "random", label: "Random side" }
          ].map(s => (
            <button key={s.id} className={`btn ${playerSide === s.id ? '' : 'ghost'}`}

          ))}
        </div>
        <div style={{ display:'flex', justifyContent:'center', marginTop: 16 }}>
          <button className="btn gold large" onClick={start}>Begin game →</button>
        </div>
      </div>
    );
  }

  const playerColor = playerSide === "white" ? "w" : "b";
  const turnLabel = thinking ? "Engine thinking…" : (game.turn === playerColor ? "Your turn" : "Opponent's turn");
  const checked = Engine.isCheck(game);

  return (
    <div className="page">
      <BackBtn onClick={onBack} label="Hub" />
      <div style={{ display:'grid', gridTemplateColumns: 'minmax(0, 1fr) 280px', gap: 24, alignItems:'start' }} className="play-grid">
        <div>
          <ChessBoard
            position={game.board}
            selected={sel}
            hints={hints}
            onSquare={onSquare}
            flipped={playerSide === "black"}
            theme="cinematic"
          />
          {checked && !over && (
            <div style={{ textAlign:'center', marginTop: 12, fontFamily:'var(--f-display)', fontSize: 20, color:'var(--crimson)', fontStyle:'italic' }}>
              Check!
            </div>
          )}
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap: 12 }}>
          <div className="card tight">
            <Eyebrow accent>{diffs.find(d => d.id === diff).name} · Elo {diffs.find(d => d.id === diff).elo}</Eyebrow>
            <div style={{ fontFamily:'var(--f-display)', fontSize: 22, fontWeight: 500, marginTop: 6 }}>{turnLabel}</div>
            <div style={{ fontFamily:'var(--f-mono)', fontSize: 12, color:'var(--ink-mute)', marginTop: 2 }}>
              Move {game.fullMove} · {game.turn === "w" ? "White" : "Black"} to play
            </div>
          </div>
          <div className="card tight" style={{ maxHeight: 280, overflowY:'auto' }}>
            <Eyebrow>Notation</Eyebrow>
            <div style={{ marginTop: 8 }}>
              {pairMoves(game.history).map((pair, i) => (
                <div key={i} style={{ display:'grid', gridTemplateColumns:'28px 1fr 1fr', gap: 6, fontFamily:'var(--f-mono)', fontSize: 13, padding:'4px 0', borderBottom:'1px solid var(--rule-soft)' }}>
                  <span style={{ color:'var(--ink-mute)' }}>{i + 1}.</span>
                  <span>{pair[0]}</span>
                  <span>{pair[1] || ""}</span>
                </div>
              ))}
              {game.history.length === 0 && (
                <div style={{ color:'var(--ink-mute)', fontSize: 13, fontStyle:'italic', fontFamily:'var(--f-display)' }}>
                  No moves yet.
                </div>
              )}
            </div>
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap: 8 }}>
            <button className="btn ghost sm" onClick={newGame}>New game</button>
            <button className="btn ghost sm" onClick={resign}>Resign</button>
          </div>
        </div>
      </div>

      {pendingPromo && (
        <div className="cutscene" onClick={() => setPendingPromo(null)}>
          <div onClick={e => e.stopPropagation()} style={{ background:'var(--bg-elev)', padding: 32, borderRadius: 18, border:'1px solid var(--rule)', maxWidth: 360, textAlign:'center' }}>
            <Eyebrow accent>Promotion</Eyebrow>
            <h2 className="display" style={{ fontSize: 24, marginTop: 6 }}>Choose a piece</h2>
            <div style={{ display:'flex', gap: 12, justifyContent:'center', marginTop: 20 }}>
              {["q", "r", "b", "n"].map(p => (
                <button key={p} className="btn ghost" onClick={() => completePromo(p)} style={{ width: 60, height: 60, fontSize: 32 }}>
                  {window.PIECE_GLYPHS[playerColor === "w" ? p.toUpperCase() : p]}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

      {over && (
        <div className="cutscene" onClick={newGame}>
          <div onClick={e => e.stopPropagation()} style={{ background:'var(--bg-elev)', padding: 40, borderRadius: 24, border:'1px solid var(--rule)', maxWidth: 480, textAlign:'center' }}>
            <Eyebrow accent>{over.reason}</Eyebrow>
            <h2 className="display" style={{ fontSize: 36, fontWeight: 500, margin:'8px 0' }}>
              {over.result === "1-0" ? "White wins" : over.result === "0-1" ? "Black wins" : "Draw"}
            </h2>
            <p style={{ fontFamily:'var(--f-display)', fontStyle:'italic', fontSize: 18, color:'var(--ink-soft)' }}>
              {playedWon(over, playerColor) ? "Beautifully played." : "Try again, captain."}
            </p>
            <div style={{ display:'flex', gap: 8, marginTop: 20, justifyContent:'center' }}>
              <button className="btn ghost" onClick={newGame}>New game</button>
              <button className="btn gold" onClick={() => { newGame(); setTimeout(start, 100); }}>Rematch</button>
            </div>
          </div>
        </div>
      )}

      <style dangerouslySetInnerHTML={{ __html: `@media (max-width: 880px) { .play-grid { grid-template-columns: 1fr !important; } }` }} />
    </div>
  );
}

function pairMoves(history) {
  const pairs = [];
  for (let i = 0; i < history.length; i += 2) {
    pairs.push([history[i].san, history[i + 1] ? history[i + 1].san : null]);
  }
  return pairs;
}
function playedWon(over, playerColor) {
  if (over.result === "1/2-1/2") return null;
  return (over.result === "1-0" && playerColor === "w") || (over.result === "0-1" && playerColor === "b");
}

window.PlayScreen = PlayScreen;

  <script type="text/babel" data-presets="react">/* global React, Engine, ChessBoard, BackBtn, Eyebrow */

// =========================================================
// FUNCTIONAL DRILLS
// =========================================================

const FILES = "abcdefgh";
function randSquare() {
  return FILES[Math.floor(Math.random() * 8)] + (1 + Math.floor(Math.random() * 8));
}


// -------- VISION TRAINER (no labels) --------
function VisionDrill({ onBack, target = null, onFinish }) {
  const DURATION = 30;
  const [time, setTime] = React.useState(DURATION);
  const [score, setScore] = React.useState(0);
  const [current, setCurrent] = React.useState(randSquare());
  const [feedback, setFeedback] = React.useState(null);
  const [done, setDone] = React.useState(false);

  React.useEffect(() => {
    if (done) return;
    const t = setInterval(() => setTime(x => x - 1), 1000);
    return () => clearInterval(t);
  }, [done]);
  React.useEffect(() => {
    if (time <= 0 && !done) {
      setDone(true);
      saveDrillBest('vision', score);
      onFinish && onFinish({ score, ok: target ? score >= target : true });
    }
  }, [time, done, score, onFinish, target]);

  function tap(sq) {
    if (done) return;
    if (sq === current) {
      setScore(s => s + 1);
      setFeedback({ ok: true, sq });
    } else {
      setFeedback({ ok: false, sq });
    }
    setTimeout(() => setFeedback(null), 200);
    setCurrent(randSquare());
  }

  if (done) {
    return (
      <div className="page narrow" style={{ textAlign:'center' }}>
        <BackBtn onClick={onBack} />
        <Eyebrow accent>Time's up</Eyebrow>

            {score >= target ? `Target met (≥ ${target}).` : `Needed ${target}.`}
          </div>
        )}
        <div style={{ display:'flex', gap: 8, justifyContent:'center', marginTop: 24 }}>
          <button className="btn ghost" onClick={onBack}>Back</button>
          <div style={{ marginTop:6, fontFamily:'var(--f-mono)', fontSize:11, color:'var(--ink-mute)', letterSpacing:'0.14em' }}>Personal best: {fmtBest('vision',' correct')}</div>
          <button className="btn gold" onClick={() => { setScore(0); setTime(DURATION); setCurrent(randSquare()); setDone(false); }}>Play again</button>
        </div>
      </div>
    );
  }

  return (
    <div className="page narrow">
      <BackBtn onClick={onBack} />
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom: 16 }}>
        <div>
          <Eyebrow accent>Vision Trainer</Eyebrow>
          <div style={{ fontFamily:'var(--f-display)', fontSize: 22, fontWeight: 500, marginTop: 2 }}>No labels. Pure memory.</div>
        </div>
        <div style={{ display:'flex', gap: 16 }}>
          <DrillStat label="Time" value={time + "s"} />
          <DrillStat label="Score" value={score} />
        </div>
      </div>
      <div style={{ textAlign:'center', margin: '20px 0' }}>
        <div style={{ fontFamily:'var(--f-display)', fontSize: 64, fontWeight: 500, color: feedback ? (feedback.ok ? 'var(--jade)' : 'var(--crimson)') : 'var(--accent)', letterSpacing: '-0.02em', transition:'color 0.2s' }}>
          {current.toUpperCase()}
        </div>
      </div>
      <div style={{ maxWidth: 500, margin: '0 auto' }} className="no-labels">
        <ChessBoard position={emptyBoard()} onSquare={tap} hints={feedback ? [{ sq: feedback.sq }] : []} />
      </div>
      <style dangerouslySetInnerHTML={{ __html: `.no-labels .file-lbl, .no-labels .rank-lbl { display: none !important; }` }} />
    </div>
  );
}

// -------- MOVE REACTION --------
function MoveReactionDrill({ onBack, target = null, onFinish }) {
  const PIECES = ["N", "B", "R", "Q", "K"];
  const ROUNDS = 5;
  const TIME_LIMIT = 60;
  const [round, setRound] = React.useState(1);
  const [score, setScore] = React.useState(0);
  const [timeLeft, setTimeLeft] = React.useState(TIME_LIMIT);
  const [pieceSq, setPieceSq] = React.useState(null);
  const [piece, setPiece] = React.useState(null);
  const [legalSet, setLegalSet] = React.useState(new Set());
  const [picked, setPicked] = React.useState(new Set());
  const [revealed, setRevealed] = React.useState(false);
  const [wrong, setWrong] = React.useState(new Set());
  const [done, setDone] = React.useState(false);

  function setupRound() {
    const p = PIECES[Math.floor(Math.random() * PIECES.length)];
    let sq;
    let attempts = 0;
    let legal;
    do {
      sq = randSquare();
      // Build a board with just this piece and find its moves
      const g = Engine.newGame();
      // clear board
      for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) g.board[r][c] = ".";
      const [r, c] = Engine.sqToRc(sq);
      g.board[r][c] = p;
      g.turn = "w";
      g.castling = { wK:false, wQ:false, bK:false, bQ:false };
      const ms = Engine.moves(g, sq);
      legal = new Set(ms.map(m => Engine.rcToSq(m.to[0], m.to[1])));
      attempts++;
    } while (legal.size < 3 && attempts < 12);
    setPieceSq(sq); setPiece(p); setLegalSet(legal);
    setPicked(new Set()); setWrong(new Set()); setRevealed(false);
  }

  React.useEffect(() => { setupRound(); }, []);

  // Time countdown
  React.useEffect(() => {
    if (done) return;
    if (timeLeft <= 0) { setDone(true); saveDrillBest('reaction', score); onFinish && onFinish({ score, ok: target ? score >= target : true }); return; }
    const t = setTimeout(() => setTimeLeft(x => x - 1), 1000);
    return () => clearTimeout(t);
  }, [timeLeft, done]);

  function tap(sq) {
    if (revealed || sq === pieceSq) return;
    if (picked.has(sq)) { picked.delete(sq); setPicked(new Set(picked)); return; }
    setPicked(new Set(picked).add(sq));
  }

  function check() {
    let correct = 0, wrongCount = 0;
    const w = new Set();
    for (const sq of picked) {
      if (legalSet.has(sq)) correct++;
      else { wrongCount++; w.add(sq); }
    }
    const missed = legalSet.size - correct;
    const points = Math.max(0, correct - wrongCount - missed);
    setScore(s => s + points);
    setWrong(w);
    setRevealed(true);
  }

  function next() {
    if (round >= ROUNDS) {
      setDone(true);
      saveDrillBest('reaction', score);
      onFinish && onFinish({ score, ok: target ? score >= target : true });
    } else {
      setRound(r => r + 1);
      setupRound();
    }
  }

  if (done) {
    return (
      <div className="page narrow" style={{ textAlign:'center' }}>
        <BackBtn onClick={onBack} />
        <Eyebrow accent>Move Reaction · complete</Eyebrow>
        <h2 className="display" style={{ fontSize: 44, margin: '12px 0' }}><em style={{ color:'var(--accent)', fontStyle:'italic' }}>{score}</em> pts</h2>
        {target != null && (
          <div style={{ marginTop: 12, fontFamily:'var(--f-display)', fontStyle:'italic', fontSize: 18, color: score >= target ? 'var(--jade)' : 'var(--crimson)' }}>
            {score >= target ? `Target met (≥ ${target}).` : `Needed ${target} total.`}
          </div>
        )}
        <div style={{ marginTop: 6, fontFamily:'var(--f-mono)', fontSize: 11, color:'var(--ink-mute)', letterSpacing:'0.14em' }}>
          Personal best: {fmtBest('reaction',' pts')}
        </div>
        <div style={{ display:'flex', gap: 8, justifyContent:'center', marginTop: 24 }}>
          <button className="btn ghost" onClick={onBack}>Back</button>
          <button className="btn gold" onClick={() => { setRound(1); setScore(0); setTimeLeft(TIME_LIMIT); setDone(false); setupRound(); }}>Play again</button>
        </div>
      </div>
    );
  }

  // build board for display
  const board = emptyBoard();
  if (pieceSq) {
    const [r, c] = Engine.sqToRc(pieceSq);
    board[r][c] = piece;
  }
  const hints = [];
  for (const sq of picked) hints.push({ sq });
  if (revealed) {
    for (const sq of legalSet) if (!picked.has(sq)) hints.push({ sq, capture: false });
    for (const sq of wrong) hints.push({ sq, wrong: true });
  }

  const pieceName = { N: "Knight", B: "Bishop", R: "Rook", Q: "Queen", K: "King" }[piece];

  return (
    <div className="page narrow">
      <BackBtn onClick={onBack} />
      <div style={{ width:'100%', height:4, background:'var(--rule)', borderRadius:99, overflow:'hidden', marginBottom:10 }}>
        <div style={{ width:(timeLeft/TIME_LIMIT*100)+'%', height:'100%', background: timeLeft<15?'var(--crimson)':(timeLeft<30?'var(--accent-deep)':'var(--accent)'), transition:'width 1s linear, background 0.3s', borderRadius:99 }} />
      </div>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom: 12 }}>
        <div>
          <Eyebrow accent>Move Reaction · Round {round}/{ROUNDS} · {timeLeft}s</Eyebrow>
          <div style={{ fontFamily:'var(--f-display)', fontSize: 26, fontWeight: 500, marginTop: 4 }}>
            Where can the <em style={{ color:'var(--accent)', fontStyle:'italic' }}>{pieceName}</em> move?
          </div>
        </div>
        <DrillStat label="Score" value={score} />
      </div>
      <div style={{ maxWidth: 500, margin: '0 auto' }}>
        <ChessBoard position={board} onSquare={tap} hints={hints} selected={pieceSq} />
      </div>
      <div style={{ display:'flex', gap: 8, justifyContent:'center', marginTop: 20 }}>
        {!revealed && <button className="btn gold large" onClick={check}>Done ({picked.size} picked) →</button>}
        {revealed && <button className="btn gold large" onClick={next}>Next round →</button>}
      </div>
      {revealed && (
        <div style={{ textAlign:'center', marginTop: 16, fontFamily:'var(--f-display)', fontStyle:'italic', fontSize: 18 }}>
          <span style={{ color:'var(--jade)' }}>{[...picked].filter(s => legalSet.has(s)).length} correct</span>
          {wrong.size > 0 && <span style={{ color:'var(--crimson)', marginLeft: 12 }}>{wrong.size} wrong</span>}
          {([...legalSet].filter(s => !picked.has(s))).length > 0 && (
            <span style={{ color:'var(--ink-mute)', marginLeft: 12 }}>{[...legalSet].filter(s => !picked.has(s)).length} missed</span>
          )}
        </div>
      )}
    </div>
  );
}

// -------- PIECE HUNT --------
function PieceHuntDrill({ onBack, target = null, onFinish }) {
  const PIECES = ["N", "B", "R", "Q"];
  const ROUNDS = 5;
  const TIME_LIMIT = 90;
  const [round, setRound] = React.useState(1);
  const [timeLeft, setTimeLeft] = React.useState(TIME_LIMIT);
  const [board, setBoard] = React.useState([]);
  const [target_piece, setTargetPiece] = React.useState(null);
  const [picked, setPicked] = React.useState(new Set());
  const [revealed, setRevealed] = React.useState(false);
  const [stats, setStats] = React.useState({ totalCorrect: 0, totalPicked: 0 });
  const [done, setDone] = React.useState(false);

  function setupRound() {
    const b = emptyBoard();
    const piece = PIECES[Math.floor(Math.random() * PIECES.length)];
    // fill with random pieces, ensure 3-5 of the target piece
    const targetCount = 3 + Math.floor(Math.random() * 3);
    let placed = 0;
    while (placed < targetCount) {
      const r = Math.floor(Math.random() * 8), c = Math.floor(Math.random() * 8);
      if (b[r][c] === ".") { b[r][c] = piece; placed++; }
    }
    // add 8-12 other pieces
    const others = ["P", "p", "N", "n", "B", "b", "R", "r", "Q", "q"].filter(x => x.toUpperCase() !== piece);
    const noise = 8 + Math.floor(Math.random() * 5);
    placed = 0;
    let attempts = 0;
    while (placed < noise && attempts < 100) {
      const r = Math.floor(Math.random() * 8), c = Math.floor(Math.random() * 8);
      if (b[r][c] === ".") { b[r][c] = others[Math.floor(Math.random() * others.length)]; placed++; }
      attempts++;
    }
    setBoard(b); setTargetPiece(piece); setPicked(new Set()); setRevealed(false);
  }

  React.useEffect(() => { setupRound(); }, []);

  // Time countdown
  React.useEffect(() => {
    if (done) return;
    if (timeLeft <= 0) {
      const acc = stats.totalPicked === 0 ? 0 : Math.round((stats.totalCorrect / stats.totalPicked) * 100);
      setDone(true); saveDrillBest('hunt', acc); onFinish && onFinish({ score: acc, ok: target ? acc >= target : true });
      return;
    }
    const t = setTimeout(() => setTimeLeft(x => x - 1), 1000);
    return () => clearTimeout(t);
  }, [timeLeft, done, stats]);

  function tap(sq) {
    if (revealed) return;
    if (picked.has(sq)) { picked.delete(sq); setPicked(new Set(picked)); }
    else setPicked(new Set(picked).add(sq));
  }

  function check() {
    const correct = [...picked].filter(sq => {
      const [r, c] = Engine.sqToRc(sq);
      return board[r][c] === target_piece;
    }).length;
    setStats(s => ({ totalCorrect: s.totalCorrect + correct, totalPicked: s.totalPicked + picked.size }));
    setRevealed(true);
  }

  function next() {
    if (round >= ROUNDS) {
      const acc = stats.totalPicked === 0 ? 0 : Math.round((stats.totalCorrect / stats.totalPicked) * 100);
      setDone(true); saveDrillBest('hunt', acc);
      onFinish && onFinish({ score: acc, ok: target ? acc >= target : true });
    } else {
      setRound(r => r + 1);
      setupRound();
    }
  }

  if (done) {
    const acc = stats.totalPicked === 0 ? 0 : Math.round((stats.totalCorrect / stats.totalPicked) * 100);
    return (
      <div className="page narrow" style={{ textAlign:'center' }}>
        <BackBtn onClick={onBack} />
        <Eyebrow accent>Piece Hunt · complete</Eyebrow>
        <h2 className="display" style={{ fontSize: 44, margin: '12px 0' }}>Accuracy · <em style={{ color:'var(--accent)', fontStyle:'italic' }}>{acc}%</em></h2>
        {target != null && (
          <div style={{ marginTop: 12, fontFamily:'var(--f-display)', fontStyle:'italic', fontSize: 18, color: acc >= target ? 'var(--jade)' : 'var(--crimson)' }}>
            {acc >= target ? `Target met (≥ ${target}%).` : `Needed ${target}%.`}
          </div>
        )}
        <div style={{ marginTop: 6, fontFamily:'var(--f-mono)', fontSize: 11, color:'var(--ink-mute)', letterSpacing:'0.14em' }}>
          Personal best: {fmtBest('hunt','%')}
        </div>
        <div style={{ display:'flex', gap: 8, justifyContent:'center', marginTop: 24 }}>
          <button className="btn ghost" onClick={onBack}>Back</button>
          <button className="btn gold" onClick={() => { setRound(1); setTimeLeft(TIME_LIMIT); setStats({ totalCorrect: 0, totalPicked: 0 }); setDone(false); setupRound(); }}>Play again</button>
        </div>
      </div>
    );
  }

  const hints = [...picked].map(sq => {
    if (!revealed) return { sq };
    const [r, c] = Engine.sqToRc(sq);
    const isCorrect = board[r][c] === target_piece;
    return { sq, capture: !isCorrect };
  });
  if (revealed) {
    for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
      if (board[r][c] === target_piece) {
        const sq = Engine.rcToSq(r, c);
        if (!picked.has(sq)) hints.push({ sq });
      }
    }
  }

  const pieceName = { N: "Knights", B: "Bishops", R: "Rooks", Q: "Queens" }[target_piece];

  return (
    <div className="page narrow">
      <BackBtn onClick={onBack} />
      <div style={{ width:'100%', height:4, background:'var(--rule)', borderRadius:99, overflow:'hidden', marginBottom:10 }}>
        <div style={{ width:(timeLeft/TIME_LIMIT*100)+'%', height:'100%', background: timeLeft<20?'var(--crimson)':(timeLeft<45?'var(--accent-deep)':'var(--accent)'), transition:'width 1s linear, background 0.3s', borderRadius:99 }} />
      </div>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom: 12 }}>
        <div>
          <Eyebrow accent>Piece Hunt · Round {round}/5 · {timeLeft}s</Eyebrow>
          <div style={{ fontFamily:'var(--f-display)', fontSize: 26, fontWeight: 500, marginTop: 4 }}>
            Find every <em style={{ color:'var(--accent)', fontStyle:'italic' }}>{pieceName}</em>.
          </div>
        </div>
      </div>
      <div style={{ maxWidth: 500, margin: '0 auto' }}>
        <ChessBoard position={board} onSquare={tap} hints={hints} />
      </div>
      <div style={{ display:'flex', gap: 8, justifyContent:'center', marginTop: 20 }}>
        {!revealed && <button className="btn gold large" onClick={check}>Done ({picked.size} picked) →</button>}
        {revealed && <button className="btn gold large" onClick={next}>{round >= 5 ? 'Finish →' : 'Next round →'}</button>}
      </div>
    </div>
  );
}

// -------- TACTICAL RADAR --------
function TacticalRadarDrill({ onBack, target = null, onFinish }) {
  const TOTAL = 12;
  const E = window.Engine;
  const [puzzles, setPuzzles] = React.useState([]);
  const [idx, setIdx] = React.useState(0);
  const [score, setScore] = React.useState(0);
  const [sel, setSel] = React.useState(null);
  const [hints, setHints] = React.useState([]);
  const [feedback, setFeedback] = React.useState(null);
  const [done, setDone] = React.useState(false);
  const [loading, setLoading] = React.useState(true);

  function genPuzzles() {
    setLoading(true); setSel(null); setHints([]); setFeedback(null); setIdx(0); setScore(0); setDone(false);
    setTimeout(() => {
      const ps = [];
      let attempts = 0;
      while (ps.length < TOTAL && attempts < 120) {
        attempts++;
        let g = E.newGame();
        const moves = 6 + Math.floor(Math.random() * 10);
        for (let i = 0; i < moves; i++) {
          const mv = E.aiMove(g, 0);
          if (!mv) break;
          g = E.applyMove(g, mv);
          if (E.isGameOver(g).over) break;
        }
        if (E.isGameOver(g).over) continue;
        const legal = E.moves(g);
        if (legal.length < 3) continue;
        const best = E.aiMove(g, 2);
        if (!best) continue;
        ps.push({
          board: g.board.map(r => [...r]),
          turn: g.turn,
          from: E.rcToSq(best.from[0], best.from[1]),
          to: E.rcToSq(best.to[0], best.to[1]),
          legal: legal.map(m => ({ from: E.rcToSq(m.from[0], m.from[1]), to: E.rcToSq(m.to[0], m.to[1]) }))
        });
      }
      setPuzzles(ps);
      setLoading(false);
    }, 30);
  }

  React.useEffect(() => { genPuzzles(); }, []);

  const puzzle = puzzles[idx];

  function onSquare(sq) {
    if (!puzzle || feedback) return;
    const [r, c] = E.sqToRc(sq);
    const piece = puzzle.board[r][c];
    const isOwn = piece !== '.' && (puzzle.turn === 'w' ? piece === piece.toUpperCase() : piece === piece.toLowerCase());
    if (sel) {
      const hit = hints.find(h => h.sq === sq);
      if (hit) {
        const correct = sel === puzzle.from && sq === puzzle.to;
        if (correct) setScore(s => s + 1);
        setFeedback({ correct, solFrom: puzzle.from, solTo: puzzle.to });
        // No auto-advance — player must press Next
      } else if (isOwn) {
        setSel(sq);
        setHints(puzzle.legal.filter(m => m.from === sq).map(m => ({ sq: m.to })));
      } else { setSel(null); setHints([]); }
    } else if (isOwn) {
      setSel(sq);
      setHints(puzzle.legal.filter(m => m.from === sq).map(m => ({ sq: m.to })));
    }
  }

  if (loading) return (
    <div className="page narrow" style={{ textAlign:'center', paddingTop: 80 }}>
      <BackBtn onClick={onBack} />
      <div style={{ fontFamily:'var(--f-display)', fontSize: 28, color:'var(--ink-mute)', fontStyle:'italic' }}>Generating puzzles…</div>
      <div style={{ marginTop: 16, width: 200, height: 3, background:'var(--rule)', borderRadius:99, margin:'16px auto 0', overflow:'hidden' }}>
        <div style={{ width:'60%', height:'100%', background:'var(--accent)', borderRadius:99, animation:'lp 1.2s ease-in-out infinite' }} />
      </div>
    </div>
  );

  if (done) return (
    <div className="page narrow" style={{ textAlign:'center' }}>
      <BackBtn onClick={onBack} />
      <Eyebrow accent>Tactical Radar · complete</Eyebrow>
      <h2 className="display" style={{ fontSize: 44, margin:'12px 0' }}>
        <em style={{ color:'var(--accent)', fontStyle:'italic' }}>{score}</em>/{TOTAL} correct
      </h2>
      {target != null && <div style={{ marginTop:12, fontFamily:'var(--f-display)', fontStyle:'italic', fontSize:18, color: score>=target?'var(--jade)':'var(--crimson)' }}>{score>=target?`Target met (≥${target}).`:`Needed ${target}.`}</div>}
      <div style={{ marginTop:6, fontFamily:'var(--f-mono)', fontSize:11, color:'var(--ink-mute)', letterSpacing:'0.14em' }}>Personal best: {fmtBest('tactic','/12')}</div>
      <div style={{ display:'flex', gap:8, justifyContent:'center', marginTop:24 }}>
        <button className="btn ghost" onClick={onBack}>Back</button>
        <button className="btn gold" onClick={genPuzzles}>Try again</button>
      </div>
    </div>
  );

  if (!puzzle) return null;
  const showSolutionHints = feedback ? [{ sq: puzzle.to, capture: false }, { sq: puzzle.from, capture: false }] : hints;

  return (
    <div className="page narrow">
      <BackBtn onClick={onBack} />
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:12 }}>
        <div>
          <Eyebrow accent>Tactical Radar · {idx+1}/{puzzles.length}</Eyebrow>
          <div style={{ fontFamily:'var(--f-display)', fontSize:22, fontWeight:500, marginTop:4 }}>
            {puzzle.turn==='w'?'White':'Black'} to play — find the best move.
          </div>
        </div>
        <DrillStat label="Score" value={score} />
      </div>
      <div style={{ maxWidth:500, margin:'0 auto', position:'relative' }}>
        <ChessBoard position={puzzle.board} selected={sel} hints={showSolutionHints} onSquare={onSquare} flipped={puzzle.turn==='b'} />
        {feedback && (
          <div style={{ position:'absolute', top:0, left:0, right:0, bottom:0, display:'flex', alignItems:'center', justifyContent:'center', background: feedback.correct?'rgba(74,107,74,0.4)':'rgba(184,80,68,0.4)', borderRadius:12, pointerEvents:'none' }}>
            <div style={{ fontFamily:'var(--f-display)', fontSize:64, color:'#fff', textShadow:'0 2px 8px rgba(0,0,0,0.4)' }}>{feedback.correct?'✓':'✗'}</div>
          </div>
        )}
      </div>
      <div style={{ marginTop:10, minHeight:56 }}>
        {feedback ? (
          <div style={{ padding:'10px 14px', borderRadius:12, background:feedback.correct?'rgba(74,107,74,0.1)':'rgba(184,80,68,0.1)', border:'1px solid '+(feedback.correct?'var(--jade)':'var(--crimson)'), fontFamily:'var(--f-display)', fontStyle:'italic', fontSize:14, lineHeight:1.6, display:'flex', alignItems:'center', gap:10, flexWrap:'wrap' }}>
            <span style={{flex:1}}>{feedback.correct?'✓ Correct! The engine agrees.':'✗ Engine prefers '+feedback.solFrom?.toUpperCase()+'→'+feedback.solTo?.toUpperCase()+'. This move maximises piece activity — study the solution above.'}</span>
            <button className="btn sm" onClick={()=>{
              const ni=idx+1; const wasRight=feedback.correct;
              setFeedback(null);setSel(null);setHints([]);
              if(ni>=puzzles.length){const final=score+(wasRight?1:0);setDone(true);saveDrillBest('tactic',final);onFinish&&onFinish({score:final,ok:target!=null?final>=target:true});}
              else setIdx(ni);
            }}>Next →</button>
          </div>
        ) : (
          <div style={{ textAlign:'center', fontFamily:'var(--f-mono)', fontSize:11, letterSpacing:'0.16em', textTransform:'uppercase', color:'var(--ink-mute)' }}>
            {!sel ? 'Select a piece' : 'Select destination'}
          </div>
        )}
      </div>
    </div>
  );
}

// -------- BLINDFOLD LITE --------
function BlindfoldDrill({ onBack, target = null, onFinish }) {
  const SHOW_SECS = 4;
  const QUESTIONS = 6;
  const E = window.Engine;
  const PNAMES = { P:'Pawn',N:'Knight',B:'Bishop',R:'Rook',Q:'Queen',K:'King', p:'pawn',n:'knight',b:'bishop',r:'rook',q:'queen',k:'king' };

  const [phase, setPhase] = React.useState('show');
  const [board, setBoard] = React.useState([]);
  const [pieces, setPieces] = React.useState([]);
  const [timer, setTimer] = React.useState(SHOW_SECS);
  const [qIdx, setQIdx] = React.useState(0);
  const [question, setQuestion] = React.useState(null);
  const [score, setScore] = React.useState(0);
  const [feedback, setFeedback] = React.useState(null);

  function setup() {
    let g = E.newGame();
    const moves = 4 + Math.floor(Math.random() * 8);
    for (let i = 0; i < moves; i++) {
      const mv = E.aiMove(g, 0); if (!mv) break;
      g = E.applyMove(g, mv);
      if (E.isGameOver(g).over) break;
    }
    const b = g.board.map(r => [...r]);
    const ps = [];
    for (let r = 0; r < 8; r++) for (let co = 0; co < 8; co++) {
      if (b[r][co] !== '.') ps.push({ piece:b[r][co], sq:E.rcToSq(r,co) });
    }
    setBoard(b); setPieces(ps); setTimer(SHOW_SECS); setPhase('show');
    setQIdx(0); setScore(0); setFeedback(null);
    if (ps.length) setQuestion(ps[Math.floor(Math.random()*ps.length)]);
  }

  React.useEffect(() => { setup(); }, []);

  React.useEffect(() => {
    if (phase !== 'show') return;
    if (timer <= 0) { setPhase('ask'); return; }
    const t = setTimeout(() => setTimer(x => x-1), 1000);
    return () => clearTimeout(t);
  }, [timer, phase]);

  function nextQuestion(currentScore) {
    const ni = qIdx + 1;
    if (ni >= QUESTIONS) {
      setPhase('done'); saveDrillBest('blindfold', currentScore);
      onFinish && onFinish({ score: currentScore, ok: target != null ? currentScore >= target : true });
    } else {
      setQIdx(ni);
      setQuestion(pieces[Math.floor(Math.random()*pieces.length)]);
      setFeedback(null);
    }
  }

  function tap(sq) {
    if (!question || feedback) return;
    const correct = sq === question.sq;
    const ns = score + (correct ? 1 : 0);
    if (correct) setScore(ns);
    setFeedback({ correct, picked:sq, answer:question.sq });
    setTimeout(() => nextQuestion(ns), 800);
  }

  const empty = Array(8).fill(null).map(() => Array(8).fill('.'));
  const color = (p) => p===p.toUpperCase()?'White':'Black';

  if (phase === 'show') return (
    <div className="page narrow">
      <BackBtn onClick={onBack} />
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:10 }}>
        <div><Eyebrow accent>Blindfold Lite</Eyebrow><div style={{ fontFamily:'var(--f-display)', fontSize:22, fontWeight:500, marginTop:4 }}>Study the position.</div></div>
        <DrillStat label="Time" value={timer+'s'} />
      </div>
      <div style={{ width:'100%', height:4, background:'var(--rule)', borderRadius:99, overflow:'hidden', marginBottom:14 }}>
        <div style={{ width:(timer/SHOW_SECS*100)+'%', height:'100%', background:'var(--accent)', transition:'width 1s linear', borderRadius:99 }} />
      </div>
      <div style={{ maxWidth:500, margin:'0 auto' }}><ChessBoard position={board} /></div>
    </div>
  );

  if (phase === 'done') return (
    <div className="page narrow" style={{ textAlign:'center' }}>
      <BackBtn onClick={onBack} />
      <Eyebrow accent>Blindfold Lite · complete</Eyebrow>
      <h2 className="display" style={{ fontSize:44, margin:'12px 0' }}><em style={{ color:'var(--accent)', fontStyle:'italic' }}>{score}</em>/{QUESTIONS} found</h2>
      {target != null && <div style={{ marginTop:12, fontFamily:'var(--f-display)', fontStyle:'italic', fontSize:18, color: score>=target?'var(--jade)':'var(--crimson)' }}>{score>=target?`Target met (≥${target}).`:`Needed ${target}.`}</div>}
      <div style={{ marginTop:6, fontFamily:'var(--f-mono)', fontSize:11, color:'var(--ink-mute)', letterSpacing:'0.14em' }}>Personal best: {fmtBest('blindfold','/6')}</div>
      <div style={{ display:'flex', gap:8, justifyContent:'center', marginTop:24 }}>
        <button className="btn ghost" onClick={onBack}>Back</button>
        <button className="btn gold" onClick={setup}>Play again</button>
      </div>
    </div>
  );

  const fbHints = feedback ? [
    { sq:question.sq },
    ...(feedback.picked!==question.sq ? [{ sq:feedback.picked, capture:true }] : [])
  ] : [];

  return (
    <div className="page narrow">
      <BackBtn onClick={onBack} />
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:12 }}>
        <div><Eyebrow accent>Blindfold Lite · {qIdx+1}/{QUESTIONS}</Eyebrow><div style={{ fontFamily:'var(--f-display)', fontSize:22, fontWeight:500, marginTop:4 }}>Where is the <em style={{ color:'var(--accent)', fontStyle:'italic' }}>{color(question?.piece||'P')} {PNAMES[question?.piece||'P']}</em>?</div></div>
        <DrillStat label="Score" value={score} />
      </div>
      <div style={{ maxWidth:500, margin:'0 auto' }}><ChessBoard position={empty} onSquare={tap} hints={fbHints} /></div>
      {feedback && <div style={{ textAlign:'center', marginTop:10, fontFamily:'var(--f-display)', fontStyle:'italic', fontSize:20, color: feedback.correct?'var(--jade)':'var(--crimson)' }}>{feedback.correct?'✓ Correct!':'✗ It was '+question?.sq?.toUpperCase()}</div>}
    </div>
  );
}

// -------- MULTI DRILL CHALLENGE (level 13) --------
function MultiDrillChallenge({ opp, player, onFinish, onBack }) {
  const PHASES = [
    { id:'vision',       label:'Vision Trainer',  target:8,  unit:' correct' },
    { id:'speed_tactic', label:'Speed Tactics',   target:5,  unit:'/10' },
    { id:'tactic',       label:'Tactical Radar',  target:5,  unit:'/12' },
    { id:'blindfold',    label:'Blindfold Lite',  target:3,  unit:'/6' },
    { id:'opening_match',label:'Opening Match',   target:4,  unit:'/6' }
  ];
  const [phase, setPhase] = React.useState(0);
  const [results, setResults] = React.useState({});
  const [finished, setFinished] = React.useState(false);

  function handleResult(phaseResult) {
    const p = PHASES[phase];
    const nr = { ...results, [p.id]: phaseResult };
    setResults(nr);
    if (phase + 1 >= PHASES.length) {
      setFinished(true);
      const allPassed = Object.values(nr).every(r => r.ok);
      onFinish({ outcome: allPassed ? 'win' : 'loss', moves: 0 });
    } else {
      setPhase(ph => ph + 1);
    }
  }

  if (finished) return null;

  const header = (
    <div style={{ background:'var(--bg-inset)', padding:'10px 16px', borderBottom:'1px solid var(--rule)', display:'flex', gap:10, flexWrap:'wrap', alignItems:'center' }}>
      <span style={{ fontFamily:'var(--f-mono)', fontSize:10, letterSpacing:'0.18em', textTransform:'uppercase', color:'var(--accent)', marginRight:4 }}>The Grand Trial</span>
      {PHASES.map((p, i) => {
        const res = results[p.id];
        const col = i===phase?'var(--accent)':res?(res.ok?'var(--jade)':'var(--crimson)'):'var(--ink-mute)';
        return <span key={p.id} style={{ fontFamily:'var(--f-mono)', fontSize:10, letterSpacing:'0.14em', textTransform:'uppercase', color:col }}>
          {res?(res.ok?'✓ ':'✗ '):(i===phase?'▶ ':'○ ')}{p.label}
        </span>;
      })}
    </div>
  );

  const p = PHASES[phase];
  const props = { onBack, target: p.target, onFinish: handleResult };
  const drills = { vision:<VisionDrill {...props}/>, speed_tactic:<SpeedTacticsDrill {...props}/>, tactic:<TacticalRadarDrill {...props}/>, blindfold:<BlindfoldDrill {...props}/>, opening_match:<OpeningMatchDrill {...props}/> };

  return <div>{header}{drills[p.id] || null}</div>;
}

// ─── Speed Tactics Drill (Level 3) ──────────────────────────────────
function SpeedTacticsDrill({ onBack, target = null, onFinish }) {
  const TOTAL = 10, TIME_PER = 6;
  const E = window.Engine;
  const [puzzles, setPuzzles] = React.useState([]);
  const [idx, setIdx] = React.useState(0);
  const [score, setScore] = React.useState(0);
  const [sel, setSel] = React.useState(null);
  const [hints, setHints] = React.useState([]);
  const [timeLeft, setTimeLeft] = React.useState(TIME_PER);
  const [feedback, setFeedback] = React.useState(null);
  const [done, setDone] = React.useState(false);
  const [loading, setLoading] = React.useState(true);

  function genPuzzles() {
    setLoading(true); setSel(null); setHints([]); setFeedback(null); setIdx(0); setScore(0); setDone(false);
    setTimeout(() => {
      const ps = []; let a = 0;
      while (ps.length < TOTAL && a++ < 150) {
        let g = E.newGame();
        const moves = 6 + Math.floor(Math.random() * 10);
        for (let i=0;i<moves;i++){const mv=E.aiMove(g,0);if(!mv)break;g=E.applyMove(g,mv);if(E.isGameOver(g).over)break;}
        if(E.isGameOver(g).over)continue;
        const legal=E.moves(g); if(legal.length<3)continue;
        const best=E.aiMove(g,2); if(!best)continue;
        ps.push({board:g.board.map(r=>[...r]),turn:g.turn,from:E.rcToSq(best.from[0],best.from[1]),to:E.rcToSq(best.to[0],best.to[1]),legal:legal.map(m=>({from:E.rcToSq(m.from[0],m.from[1]),to:E.rcToSq(m.to[0],m.to[1])}))});
      }
      setPuzzles(ps); setLoading(false); setTimeLeft(TIME_PER);
    }, 30);
  }
  React.useEffect(()=>{genPuzzles();},[]);

  React.useEffect(()=>{
    if(loading||done||feedback)return;
    if(timeLeft<=0){
      // Time's up — mark as wrong, advance
      setFeedback({correct:false});
      setTimeout(()=>{setFeedback(null);setSel(null);setHints([]);advance(false);},600);
      return;
    }
    const t=setTimeout(()=>setTimeLeft(x=>x-1),1000);
    return()=>clearTimeout(t);
  },[timeLeft,loading,done,feedback]);

  function advance(wasCorrect) {
    const ni=idx+1;
    if(ni>=puzzles.length){
      const final=score+(wasCorrect?1:0);
      setDone(true); saveDrillBest('speed_tactic',final);
      onFinish&&onFinish({score:final,ok:target!=null?final>=target:true});
    } else { setIdx(ni); setTimeLeft(TIME_PER); }
  }

  const puzzle=puzzles[idx];
  function onSquare(sq){
    if(!puzzle||feedback)return;
    const[r,co]=E.sqToRc(sq);
    const piece=puzzle.board[r][co];
    const isOwn=piece!=='.'&&(puzzle.turn==='w'?piece===piece.toUpperCase():piece===piece.toLowerCase());
    if(sel){
      const hit=hints.find(h=>h.sq===sq);
      if(hit){
        const correct=sel===puzzle.from&&sq===puzzle.to;
        if(correct)setScore(s=>s+1);
        setFeedback({correct});
        setTimeout(()=>{setFeedback(null);setSel(null);setHints([]);advance(correct);},700);
      } else if(isOwn){setSel(sq);setHints(puzzle.legal.filter(m=>m.from===sq).map(m=>({sq:m.to})));}
      else{setSel(null);setHints([]);}
    } else if(isOwn){setSel(sq);setHints(puzzle.legal.filter(m=>m.from===sq).map(m=>({sq:m.to})));}
  }

  if(loading)return(<div className="page narrow" style={{textAlign:'center',paddingTop:80}}><BackBtn onClick={onBack}/><div style={{fontFamily:'var(--f-display)',fontSize:28,color:'var(--ink-mute)',fontStyle:'italic'}}>Generating positions…</div></div>);
  if(done)return(
    <div className="page narrow" style={{textAlign:'center'}}>
      <BackBtn onClick={onBack}/><Eyebrow accent>Speed Tactics · complete</Eyebrow>
      <h2 className="display" style={{fontSize:44,margin:'12px 0'}}><em style={{color:'var(--accent)',fontStyle:'italic'}}>{score}</em>/{TOTAL}</h2>
      {target!=null&&<div style={{marginTop:12,fontFamily:'var(--f-display)',fontStyle:'italic',fontSize:18,color:score>=target?'var(--jade)':'var(--crimson)'}}>{score>=target?`Target met (≥${target}).`:`Needed ${target}.`}</div>}
      <div style={{marginTop:6,fontFamily:'var(--f-mono)',fontSize:11,color:'var(--ink-mute)',letterSpacing:'0.14em'}}>Personal best: {fmtBest('speed_tactic','/10')}</div>
      <div style={{display:'flex',gap:8,justifyContent:'center',marginTop:24}}>
        <button className="btn ghost" onClick={onBack}>Back</button>
        <button className="btn gold" onClick={genPuzzles}>Try again</button>
      </div>
    </div>
  );
  if(!puzzle)return null;
  const showHints=feedback?[{sq:puzzle.to},{sq:puzzle.from}]:hints;
  const timerPct=timeLeft/TIME_PER*100;
  return(
    <div className="page narrow">
      <BackBtn onClick={onBack}/>
      <div style={{width:'100%',height:5,background:'var(--rule)',borderRadius:99,overflow:'hidden',marginBottom:10}}>
        <div style={{width:timerPct+'%',height:'100%',background:timeLeft<=2?'var(--crimson)':timeLeft<=4?'var(--accent-deep)':'var(--jade)',transition:'width 1s linear',borderRadius:99}}/>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:12}}>
        <div><Eyebrow accent>Speed Tactics · {idx+1}/{TOTAL} · {timeLeft}s</Eyebrow>
          <div style={{fontFamily:'var(--f-display)',fontSize:22,fontWeight:500,marginTop:4}}>{puzzle.turn==='w'?'White':'Black'} to play — fast!</div>
        </div>
        <DrillStat label="Score" value={score}/>
      </div>
      <div style={{maxWidth:500,margin:'0 auto',position:'relative'}}>
        <ChessBoard position={puzzle.board} selected={sel} hints={showHints} onSquare={onSquare} flipped={puzzle.turn==='b'}/>
        {feedback&&<div style={{position:'absolute',top:0,left:0,right:0,bottom:0,display:'flex',alignItems:'center',justifyContent:'center',background:feedback.correct?'rgba(74,107,74,0.4)':'rgba(184,80,68,0.4)',borderRadius:12,pointerEvents:'none'}}><div style={{fontFamily:'var(--f-display)',fontSize:64,color:'#fff',textShadow:'0 2px 8px rgba(0,0,0,0.4)'}}>{feedback.correct?'✓':'✗'}</div></div>}
      </div>
    </div>
  );
}

// ─── Opening Match Drill (Level 6) ──────────────────────────────────
function OpeningMatchDrill({ onBack, target = null, onFinish }) {
  const E = window.Engine;
  // Generate questions from opening books
  function buildQuestions() {
    const qs = [];
    const books = window.OPENING_BOOKS || [];
    books.forEach(book => {
      book.lines.forEach(line => {
        const moves = line.moves;
        // Pick a random mid-line position (after 2-5 moves of the side being trained)
        const pMoves = moves.filter(m => m.p);
        if (pMoves.length < 2) return;
        const pickIdx = 1 + Math.floor(Math.random() * Math.min(pMoves.length - 1, 3));
        // Play moves up to that point
        let g = E.newGame();
        let played = 0;
        for (let i = 0; i < moves.length; i++) {
          const mv = moves[i];
          if (mv.o) { const r = E.makeMove(g, mv.o.slice(0,2), mv.o.slice(2,4)); if(r) g=r; }
          else if (mv.p) {
            if (played === pickIdx) break;
            played++;
            const r = E.makeMove(g, mv.p.slice(0,2), mv.p.slice(2,4)); if(r) g=r;
          }
        }
        // Correct next book move
        const correctMove = moves.filter(m=>m.p)[pickIdx];
        if (!correctMove) return;
        const correctSAN = E.moves(g).find(m=>E.rcToSq(m.to[0],m.to[1])===correctMove.p.slice(2,4)&&E.rcToSq(m.from[0],m.from[1])===correctMove.p.slice(0,2))?.san || correctMove.p;
        // Generate wrong options
        const legal = E.moves(g);
        const others = legal.filter(m=>E.rcToSq(m.from[0],m.from[1])!==correctMove.p.slice(0,2)||E.rcToSq(m.to[0],m.to[1])!==correctMove.p.slice(2,4)).slice(0,3).map(m=>m.san||E.rcToSq(m.to[0],m.to[1]));
        const options = [correctSAN,...others].sort(()=>Math.random()-0.5);
        qs.push({board:g.board.map(r=>[...r]),turn:g.turn,correct:correctSAN,options,note:correctMove.note,opening:book.name,line:line.name,flipped:book.color==='b'});
      });
    });
    // Shuffle and take 6
    return qs.sort(()=>Math.random()-0.5).slice(0,6);
  }

  const [questions] = React.useState(()=>buildQuestions());
  const [idx, setIdx] = React.useState(0);
  const [score, setScore] = React.useState(0);
  const [picked, setPicked] = React.useState(null);
  const [done, setDone] = React.useState(false);

  const q = questions[idx];

  function pick(opt) {
    if (picked) return;
    const correct = opt === q.correct;
    if (correct) setScore(s=>s+1);
    setPicked(opt);
  }

  function next() {
    setPicked(null);
    const ni=idx+1;
    if(ni>=questions.length){
      const final=score+(picked===q.correct?1:0);
      setDone(true); saveDrillBest('opening_match',final);
      onFinish&&onFinish({score:final,ok:target!=null?final>=target:true});
    } else setIdx(ni);
  }

  if(done||!q)return(
    <div className="page narrow" style={{textAlign:'center'}}>
      <BackBtn onClick={onBack}/><Eyebrow accent>Opening Match · complete</Eyebrow>
      <h2 className="display" style={{fontSize:44,margin:'12px 0'}}><em style={{color:'var(--accent)',fontStyle:'italic'}}>{score}</em>/{questions.length} correct</h2>
      {target!=null&&<div style={{marginTop:12,fontFamily:'var(--f-display)',fontStyle:'italic',fontSize:18,color:score>=target?'var(--jade)':'var(--crimson)'}}>{score>=target?`Target met (≥${target}).`:`Needed ${target}.`}</div>}
      <div style={{marginTop:6,fontFamily:'var(--f-mono)',fontSize:11,color:'var(--ink-mute)',letterSpacing:'0.14em'}}>Personal best: {fmtBest('opening_match','/6')}</div>
      <div style={{display:'flex',gap:8,justifyContent:'center',marginTop:24}}>
        <button className="btn ghost" onClick={onBack}>Back</button>
      </div>
    </div>
  );

  return(
    <div className="page narrow">
      <BackBtn onClick={onBack}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:12}}>
        <div><Eyebrow accent>{q.opening} · {idx+1}/{questions.length}</Eyebrow>
          <div style={{fontFamily:'var(--f-display)',fontSize:20,fontWeight:500,marginTop:4}}>{q.turn==='w'?'White':'Black'} to play — find the best theoretical move.</div>
        </div>
        <DrillStat label="Score" value={score}/>
      </div>
      <div style={{maxWidth:420,margin:'0 auto 16px'}}><ChessBoard position={q.board} flipped={q.flipped}/></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
        {q.options.map(opt=>{
          let bg='var(--bg-elev)', border='var(--rule)', color='var(--ink)';
          if(picked){if(opt===q.correct){bg='rgba(74,107,74,0.15)';border='var(--jade)';}else if(opt===picked){bg='rgba(184,80,68,0.15)';border='var(--crimson)';}}
          return(<button key={opt} onClick={()=>pick(opt)} disabled={!!picked} style={{padding:'14px 12px',borderRadius:12,border:'1px solid '+border,background:bg,color,fontFamily:'var(--f-mono)',fontSize:16,fontWeight:600,cursor:picked?'default':'pointer',transition:'all .15s'}}>{opt}</button>);
        })}
      </div>
      {picked&&<div style={{marginTop:14,padding:14,background:'var(--bg-inset)',borderRadius:12,fontFamily:'var(--f-display)',fontStyle:'italic',fontSize:15,color:'var(--ink-soft)',lineHeight:1.6}}>{picked===q.correct?'✓ Correct! ':'✗ The right move was '+q.correct+'. '}{q.note}</div>}
      {picked&&<button className="btn gold large" style={{width:'100%',marginTop:12}} onClick={next}>{idx+1<questions.length?'Next →':'See results →'}</button>}
    </div>
  );
}
