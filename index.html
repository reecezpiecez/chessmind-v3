// ─── Opening Trainer (ChessReps-style) ──────────────────────────────
function OpeningTrainer({ onBack, progress, setProgress }) {
  const E = window.Engine;
  const books = window.OPENING_BOOKS || [];
  const bests = getDrillBests();
  const [view, setView] = React.useState('select'); // 'select' | 'practice'
  const [selBook, setSelBook] = React.useState(null);
  const [selLine, setSelLine] = React.useState(null);
  const [game, setGame] = React.useState(null);
  const [moveIdx, setMoveIdx] = React.useState(0);
  const [feedback, setFeedback] = React.useState(null);
  const [score, setScore] = React.useState({correct:0,total:0});
  const [sel, setSel] = React.useState(null);
  const [hints, setHints] = React.useState([]);
  const [lastMove, setLastMove] = React.useState(null);
  const [complete, setComplete] = React.useState(false);

  function startLine(book, line) {
    setSelBook(book); setSelLine(line);
    setGame(E.newGame()); setMoveIdx(0); setFeedback(null);
    setScore({correct:0,total:0}); setSel(null); setHints([]); setLastMove(null); setComplete(false);
    setView('practice');
  }

  // The current move player must make
  const playerMoves = selLine?.moves.filter(m=>m.p) || [];
  const currentPlayerMove = playerMoves[score.total] || null;
  const isDone = complete;

  // Auto-play opponent moves
  React.useEffect(()=>{
    if(!game||!selLine||view!=='practice'||feedback||complete) return;
    const moves=selLine.moves;
    // Find the current move in the line
    const allMoves=[...moves];
    // How many total moves have been applied so far?
    const applied=game.history.length;
    if(applied>=allMoves.length){setComplete(true);return;}
    const nextMv=allMoves[applied];
    if(!nextMv) return;
    // If it's an opponent move, auto-play it
    if(nextMv.o){
      const r=E.makeMove(game,nextMv.o.slice(0,2),nextMv.o.slice(2,4));
      if(r){
        const lm=r.history[r.history.length-1];
        if(lm)setLastMove([E.rcToSq(lm.from[0],lm.from[1]),E.rcToSq(lm.to[0],lm.to[1])]);
        setTimeout(()=>setGame(r),400);
      }
    }
  },[game?.history.length, view, feedback, complete]);

  function onSquare(sq){
    if(!game||!selLine||feedback||complete) return;
    if(!currentPlayerMove) return;
    const moves=selLine.moves;
    const applied=game.history.length;
    if(applied>=moves.length) return;
    const nextMv=moves[applied];
    if(!nextMv?.p) return; // not player's turn yet

    const [r,co]=E.sqToRc(sq);
    const piece=game.board[r][co];
    const isOwn=piece!=='.'&&(game.turn==='w'?piece===piece.toUpperCase():piece===piece.toLowerCase());

    if(sel){
      const hit=hints.find(h=>h.sq===sq);
      if(hit){
        const correct=sel===nextMv.p.slice(0,2)&&sq===nextMv.p.slice(2,4);
        setScore(s=>({correct:s.correct+(correct?1:0),total:s.total+1}));
        setFeedback({correct,note:nextMv.note,correctFrom:nextMv.p.slice(0,2),correctTo:nextMv.p.slice(2,4)});
        // Apply the correct move regardless
        const r=E.makeMove(game,nextMv.p.slice(0,2),nextMv.p.slice(2,4));
        if(r){
          const lm=r.history[r.history.length-1];
          if(lm)setLastMove([E.rcToSq(lm.from[0],lm.from[1]),E.rcToSq(lm.to[0],lm.to[1])]);
          setTimeout(()=>{setGame(r);setFeedback(null);setSel(null);setHints([]);},correct?900:1400);
        }
      } else if(isOwn){setSel(sq);setHints(E.moves(game,sq).map(m=>({sq:E.rcToSq(m.to[0],m.to[1]),capture:m.capture})));}
      else{setSel(null);setHints([]);}
    } else if(isOwn){setSel(sq);setHints(E.moves(game,sq).map(m=>({sq:E.rcToSq(m.to[0],m.to[1]),capture:m.capture})));}
  }

  if(view==='select')return(
    <div className="page narrow">
      <BackBtn onClick={onBack}/>
      <Eyebrow accent>Opening Trainer</Eyebrow>
      <h1 className="display" style={{fontSize:44,margin:'12px 0 8px'}}>Learn an Opening.</h1>
      <p style={{color:'var(--ink-soft)',fontStyle:'italic',fontFamily:'var(--f-display)',fontSize:18,marginBottom:32,maxWidth:560}}>Repeat the line until it becomes instinct. The system plays the other side from the book.</p>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:14}}>
        {books.map(book=>{
          const bookBest=bests['opening_'+book.id];
          return(
            <div key={book.id} className="card" style={{padding:'var(--r3)'}}>
              <div style={{display:'flex',alignItems:'baseline',gap:10,marginBottom:8}}>
                <span style={{fontFamily:'var(--f-display)',fontSize:32}}>{book.glyph}</span>
                <div>
                  <div style={{fontFamily:'var(--f-display)',fontWeight:500,fontSize:19}}>{book.name}</div>
                  <div style={{fontFamily:'var(--f-mono)',fontSize:10,letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--ink-mute)'}}>
                    {book.color==='w'?'Play as White':'Play as Black'} · {book.elo}
                  </div>
                </div>
              </div>
              <p style={{fontSize:13,color:'var(--ink-soft)',lineHeight:1.55,marginBottom:12}}>{book.overview}</p>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {book.lines.map(line=>(
                  <button key={line.id} className="btn ghost sm" style={{justifyContent:'space-between',display:'flex',alignItems:'center'}} onClick={()=>startLine(book,line)}>
                    <span>{line.name}</span>
                    <span style={{fontFamily:'var(--f-mono)',fontSize:10,color:'var(--accent)'}}>{bests['opening_'+book.id+'_'+line.id]!=null?'Best: '+bests['opening_'+book.id+'_'+line.id]+'%':'→'}</span>
                  </button>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );

  // Practice view
  const isPlayerTurn = game && selLine && (() => {
    const applied = game.history.length;
    const mv = selLine.moves[applied];
    return mv?.p != null;
  })();

  const pct = score.total > 0 ? Math.round(score.correct/score.total*100) : 100;

  if(isDone)return(
    <div className="page narrow" style={{textAlign:'center'}}>
      <Eyebrow accent>Line complete!</Eyebrow>
      <h2 className="display" style={{fontSize:44,margin:'12px 0'}}>{score.correct}/{score.total} moves correct</h2>
      <div style={{fontSize:28,marginBottom:8}}>{pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':'⭐'}</div>
      <p style={{fontFamily:'var(--f-display)',fontStyle:'italic',fontSize:18,color:'var(--ink-soft)'}}>
        {pct===100?'Perfect! You know this line.':pct>=70?'Good — replay the line to reinforce the weak spots.':'Keep studying — replay until it feels natural.'}
      </p>
      {(() => { saveDrillBest('opening_'+selBook.id+'_'+selLine.id, pct); })()}
      <div style={{display:'flex',gap:8,justifyContent:'center',marginTop:24}}>
        <button className="btn ghost" onClick={()=>setView('select')}>All openings</button>
        <button className="btn gold" onClick={()=>startLine(selBook,selLine)}>Replay →</button>
      </div>
    </div>
  );

  return(
    <div className="page narrow">
      <BackBtn onClick={()=>setView('select')} label="Openings"/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:10}}>
        <div>
          <Eyebrow accent>{selBook?.name} · {selLine?.name}</Eyebrow>
          <div style={{fontFamily:'var(--f-display)',fontSize:20,fontWeight:500,marginTop:4}}>
            {isPlayerTurn ? 'Your turn — find the book move.' : 'Watch…'}
          </div>
        </div>
        <DrillStat label="Accuracy" value={score.total>0?pct+'%':'—'}/>
      </div>
      {feedback&&(
        <div style={{marginBottom:10,padding:12,borderRadius:12,background:feedback.correct?'rgba(74,107,74,0.12)':'rgba(184,80,68,0.12)',border:'1px solid '+(feedback.correct?'var(--jade)':'var(--crimson)'),fontFamily:'var(--f-display)',fontStyle:'italic',fontSize:15,color:'var(--ink)',lineHeight:1.6}}>
          {feedback.correct?'✓ Correct! ':'✗ The book move is here — '}
          {feedback.note}
        </div>
      )}
      <div style={{maxWidth:500,margin:'0 auto'}}>
        <ChessBoard position={game?.board||[]} selected={sel} hints={isPlayerTurn&&!feedback?hints:[]} lastMove={lastMove} onSquare={onSquare} flipped={selBook?.color==='b'}/>
      </div>
      <div style={{marginTop:10,fontFamily:'var(--f-mono)',fontSize:10,letterSpacing:'0.16em',textTransform:'uppercase',color:'var(--ink-mute)',textAlign:'center'}}>
        {selLine?.desc}
      </div>
    </div>
  );
}

Object.assign(window, { VisionDrill, MoveReactionDrill, PieceHuntDrill, TacticalRadarDrill, BlindfoldDrill, SpeedTacticsDrill, OpeningMatchDrill, OpeningTrainer, TheoryCard, MultiDrillChallenge, DrillRunner });
function emptyBoard() {
  const b = [];
  for (let r = 0; r < 8; r++) { const row = []; for (let c = 0; c < 8; c++) row.push("."); b.push(row); }
  return b;
}

function DrillStat({ label, value }) {
  return (
    <div style={{ textAlign:'right' }}>
      <div style={{ fontFamily:'var(--f-mono)', fontSize: 10, letterSpacing:'0.16em', textTransform:'uppercase', color:'var(--ink-mute)' }}>{label}</div>
      <div style={{ fontFamily:'var(--f-display)', fontSize: 24, fontWeight: 500, lineHeight: 1 }}>{value}</div>
    </div>
  );
}

Object.assign(window, { CoordinateDrill, VisionDrill, MoveReactionDrill, PieceHuntDrill, DrillRunner });
</script>
  <script type="text/babel" data-presets="react">/* global React, ReactDOM */
/* global HubScreen, OdysseiaMap, Cutscene, Dossier, Battle, PlayScreen, DrillsScreen, OpeningsScreen, JournalScreen, HallScreen, StatsScreen */
/* global TweaksPanel, TweakSection, TweakSelect, TweakRadio, TweakColor, useTweaks */
/* global IconBtn, Portrait, useToasts, useCountUp, Stars, Eyebrow */

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "accent": "brass",
  "typo": "editorial"
}/*EDITMODE-END*/;

// =========================================================
// MOBILE BOTTOM NAV
// =========================================================
function MobileNav({ onNav, route }) {
  const items = [
    { id:'hub',    label:'Hub',      ico:'⌂' },
    { id:'map',    label:'Odysseia', ico:'⚔' },
    { id:'play',   label:'Play',     ico:'♟' },
    { id:'drills', label:'Drills',   ico:'✦' },
    { id:'stats',  label:'Profile',  ico:'↗' },
  ];
  const active = ['map','dossier','battle'].includes(route) ? 'map'
    : ['drills','drill'].includes(route) ? 'drills'
    : ['stats','journal','hall','trophies','openings'].includes(route) ? 'stats'
    : route;
  return (
    <div className="mobile-nav">
      {items.map(item => (
        <button key={item.id} className={'mnav-btn'+(active===item.id?' active':'')} onClick={() => onNav(item.id)}>
          <span className="mnav-ico">{item.ico}</span>
          {item.label}
        </button>
      ))}
    </div>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [route, setRoute] = React.useState({ name: 'hub' });
  const DEFAULT_PROGRESS = {
    completed: [],
    stars: {},
    wins: 0, losses: 0, draws: 0,
    seenActIntros: []
  };
  const DEFAULT_PLAYER = {
    name: "",
    surname: "",
    elo: 600,
    xp: 0,
    style: "Tactician",
    avatar: { piece: "pawn", palette: "ivory" }
  };
  const [player, setPlayer] = React.useState(() => {
    try { const s = localStorage.getItem('cm_player'); if (s) return { ...DEFAULT_PLAYER, ...JSON.parse(s) }; } catch(e){}
    return DEFAULT_PLAYER;
  });
  const [progress, setProgress] = React.useState(() => {
    try { const s = localStorage.getItem('cm_progress'); if (s) return { ...DEFAULT_PROGRESS, ...JSON.parse(s) }; } catch(e){}
    return DEFAULT_PROGRESS;
  });

  // persist
  React.useEffect(() => { try { localStorage.setItem('cm_player', JSON.stringify(player)); } catch(e){} }, [player]);
  React.useEffect(() => { try { localStorage.setItem('cm_progress', JSON.stringify(progress)); } catch(e){} }, [progress]);

  function resetProgress() {
    if (!window.confirm('Reset EVERYTHING? Your name, progress, XP, Elo, and all achievements will be deleted. You will start from scratch.')) return;
    localStorage.removeItem('cm_player');
    localStorage.removeItem('cm_progress');
    setProgress({ ...DEFAULT_PROGRESS, journal: [] });
    setPlayer({ ...DEFAULT_PLAYER, name: '', playStyle: '' });
    nav('hub');
  }

  // ── Trophy awarding ─────────────────────────────────────
  function grantTrophy(id) {
    setProgress(p => {
      const list = p.trophies || [];
      if (list.includes(id)) return p;
      const tdef = window.TROPHIES.find(t => t.id === id);
      if (tdef) toast({ title: tdef.name, sub: 'Trophy unlocked', icon: tdef.glyph });
      return { ...p, trophies: [...list, id] };
    });
  }

  function checkAllMilestones(p, pl) {
    const earned = new Set(p.trophies || []);
    for (const t of window.TROPHIES) {
      if (earned.has(t.id)) continue;
      if (t.kind === 'milestone' && t.check && t.check(p, pl)) grantTrophy(t.id);
      if (t.kind === 'boss' && p.completed.includes(t.oppId)) grantTrophy(t.id);
    }
  }

  // Re-check milestones on state changes
  React.useEffect(() => { checkAllMilestones(progress, player); }, [progress.completed, progress.wins, player.xp, player.elo]);

  // ── Playing style change from stats ─────────────────────────────
  React.useEffect(() => {
    function onStyleChange(e) { setPlayer(p => ({ ...p, playStyle: e.detail })); }
    window.addEventListener('chessmind-style', onStyleChange);
    return () => window.removeEventListener('chessmind-style', onStyleChange);
  }, []);

  // ── MADSEN cheat code — skip current/next Odysseia level ─
  React.useEffect(() => {
    let buf = '';
    function onKey(e) {
      const tgt = e.target;
      if (tgt && (tgt.tagName === 'INPUT' || tgt.tagName === 'TEXTAREA' || tgt.isContentEditable)) return;
      const k = (e.key || '').toLowerCase();
      if (k.length !== 1 || !/[a-z]/.test(k)) return;
      buf = (buf + k).slice(-6);
      if (buf === 'madsen') {
        buf = '';
        triggerCheat();
      }
    }
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [route, progress, player]);

  function triggerCheat() {
    let opp = route.opp;
    if (!opp) {
      opp = window.OPPONENTS.find(o => !progress.completed.includes(o.id));
    }
    if (!opp) {
      toast({ title: 'Odysseia complete', sub: 'No more levels to skip', icon: '✓' });
      return;
    }
    toast({ title: 'MADSEN', sub: `Victory over ${opp.name}`, icon: '⚡' });
    finishBattle(opp, { outcome: 'win', moves: 0, cheat: true });
  }

  function handleDrillFinish(drillId, result) {
    const tdef = window.TROPHIES.find(t => t.kind === 'drill' && t.drillId === drillId);
    if (tdef && !((progress.trophies || []).includes(tdef.id)) && result.score >= tdef.threshold) {
      grantTrophy(tdef.id);
    }
  }
  const [postModal, setPostModal] = React.useState(null);
  const [theoryCard, setTheoryCard] = React.useState(null); // {opp, onContinue}
  const [pendingCutscene, setPendingCutscene] = React.useState(null);
  const { push: toast, ToastStack } = useToasts();

  // Apply theme to document
  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', t.theme);
    document.documentElement.setAttribute('data-accent', t.accent);
    document.documentElement.setAttribute('data-typo', t.typo);
  }, [t.theme, t.accent, t.typo]);

  function nav(name, payload = {}) { setRoute({ name, ...payload }); }

  function openOdysseia() {
    // check for unseen act intros
    const lastDone = Math.max(0, ...progress.completed);
    const next = window.OPPONENTS.find(o => o.id === lastDone + 1) || window.OPPONENTS[0];
    if (!progress.seenActIntros.includes(next.act)) {
      const act = window.ACTS.find(a => a.id === next.act);
      setPendingCutscene({ act, then: () => nav('map') });
      return;
    }
    nav('map');
  }

  function selectLevel(opp) {
    nav('dossier', { opp });
  }

  function challengeOpp(opp, kind) {
    // Show theory card only for chess battles (not drills), only if theory exists
    const hasTheory = !!(window.CHAPTER_THEORY||{})[opp.id];
    const hasDrill = !!opp.drillChallenge;
    if (hasTheory && !hasDrill) {
      setTheoryCard({ opp, onContinue: () => { setTheoryCard(null); nav('battle', { opp }); } });
    } else {
      nav('battle', { opp });
    }
  }

  function finishBattle(opp, result) {
    const won = result.outcome === 'win';
    const draw = result.outcome === 'draw';
    const stars = won ? (result.moves < 25 ? 3 : result.moves < 40 ? 2 : 1) : 0;
    const wasFirstClear = !progress.completed.includes(opp.id);

    const newProg = { ...progress };
    if (won && wasFirstClear) newProg.completed = [...progress.completed, opp.id];
    if (won) newProg.stars = { ...progress.stars, [opp.id]: Math.max(progress.stars[opp.id] || 0, stars) };
    newProg.wins = (progress.wins || 0) + (won ? 1 : 0);
    newProg.losses = (progress.losses || 0) + (!won && !draw ? 1 : 0);

    // XP: full only on first clear, small on replay win, zero on loss
    const xpGain = won && wasFirstClear ? opp.rewardXP
                 : won ? Math.round(opp.rewardXP * 0.08)
                 : 0;
    const eloChange = won ? Math.max(5, Math.round((opp.elo - (player.elo || 600)) * 0.04) + 10) : (draw ? 2 : -8);

    // Journal entry — opponent-specific narrative
    const today = new Date();
    const dateStr = today.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    const entryData = (window.JOURNAL_ENTRIES || {})[opp.id];
    const variant = entryData ? (won ? entryData.win : entryData.loss) : null;
    const journalEntry = {
      id: Date.now(),
      date: dateStr,
      opponent: opp.name,
      result: won ? 'win' : draw ? 'draw' : 'loss',
      title: variant ? variant.title : (won ? (wasFirstClear ? `Defeated ${opp.name}` : `Rematch: ${opp.name}`) : `Lost to ${opp.name}`),
      body: variant ? variant.body : (won ? `${opp.name} played well but the position was mine in the end.` : `${opp.name} outplayed me today. I'll study this one.`),
      moves: result.moves,
      elo: player.elo || 600,
      eloAfter: (player.elo || 600) + eloChange
    };
    newProg.journal = [journalEntry, ...(progress.journal || [])].slice(0, 50);
    setProgress(newProg);

    setPlayer(p => ({ ...p, xp: (p.xp || 0) + xpGain, elo: Math.max(100, (p.elo || 600) + eloChange) }));

    setPostModal({
      opp, won, draw, stars,
      xp: xpGain,
      eloChange,
      wasFirstClear,
      moves: result.moves,
      newUnlock: won && wasFirstClear && opp.unlockTheme,
      newAct: won && wasFirstClear && opp.actCloser ? window.ACTS.find(a => a.id === opp.act + 1) : null
    });
  }

  function dismissPost() {
    const isNextAct = postModal && postModal.newAct;
    const nextActObj = postModal && postModal.newAct;
    setPostModal(null);
    if (isNextAct) {
      setPendingCutscene({ act: nextActObj, then: () => nav('map') });
      setProgress(p => ({ ...p, seenActIntros: [...p.seenActIntros, nextActObj.id] }));
    } else {
      nav('map');
    }
  }

  function nextLevel() {
    if (!postModal) return;
    const opp = postModal.opp;
    const next = window.OPPONENTS.find(o => o.id === opp.id + 1);
    setPostModal(null);
    if (next) {
      if (opp.actCloser) {
        const nextActObj = window.ACTS.find(a => a.id === opp.act + 1);
        setPendingCutscene({ act: nextActObj, then: () => nav('dossier', { opp: next }) });
        setProgress(p => ({ ...p, seenActIntros: [...p.seenActIntros, nextActObj.id] }));
      } else {
        nav('dossier', { opp: next });
      }
    } else {
      nav('map');
    }
  }

  function retry() {
    if (!postModal) return;
    const opp = postModal.opp;
    setPostModal(null);
    nav('battle', { opp });
  }

  // ── Onboarding gate ──────────────────────────────────────
  if (!player.name) {
    return (
      <div className="app">
        <PlayerSetup onComplete={(name, style) => setPlayer(p => ({ ...p, name, playStyle: style || 'universal' }))} />
      </div>
    );
  }

  return (
    <div className="app">
      <TopBar player={player} onNav={nav} t={t} setTweak={setTweak} onCheat={triggerCheat} />

      {route.name === 'hub' && <HubScreen player={player} setPlayer={setPlayer} progress={progress} onNav={nav} onOpenStory={openOdysseia} />}
      {route.name === 'map' && <OdysseiaMap progress={progress} onSelectLevel={selectLevel} onBack={() => nav('hub')} />}
      {route.name === 'dossier' && <Dossier opp={route.opp} onChallenge={(kind) => challengeOpp(route.opp, kind)} onBack={() => nav('map')} />}
      {route.name === 'battle' && (() => {
        const opp = route.opp;
        if (!opp) return null;
        const dc = opp.drillChallenge;
        if (dc && dc.type === 'multi') return <MultiDrillChallenge opp={opp} player={player} onFinish={(r) => finishBattle(opp, r)} onBack={() => nav('map')} />;
        if (dc) return <DrillRunner drillId={dc.type} target={dc.goal} onBack={() => nav('map')} onFinish={(r) => finishBattle(opp, { outcome: r.ok ? 'win' : 'loss', moves: 0 })} />;
        return <Battle opp={opp} player={player} onFinish={(r) => finishBattle(opp, r)} onBack={() => nav('map')} />;
      })()}
      {route.name === 'play' && <PlayScreen onBack={() => nav('hub')} />}
      {route.name === 'drills' && <DrillsScreen onBack={() => nav('hub')} onPickDrill={(d) => nav('drill', { drillId: d.id })} player={player} />}
      {route.name === 'drill' && <DrillRunner drillId={route.drillId} onBack={() => nav('drills')} onFinish={(r) => handleDrillFinish(route.drillId, r)} />}
      {route.name === 'journal' && <JournalScreen progress={progress} onBack={() => nav('hub')} />}
      {route.name === 'openings' && <OpeningTrainer onBack={() => nav('hub')} progress={progress} setProgress={setProgress} />}
      {route.name === 'hall' && <HallScreen progress={progress} onBack={() => nav('hub')} />}
      {route.name === 'trophies' && <TrophiesScreen progress={progress} onBack={() => nav('hub')} />}
      {route.name === 'stats' && <StatsScreen player={player} progress={progress} onReset={resetProgress} onBack={() => nav('hub')} />}

      {pendingCutscene && (
        <Cutscene
          act={pendingCutscene.act}
          onContinue={() => { const t = pendingCutscene.then; setPendingCutscene(null); t && t(); }}
          onSkip={() => { const t = pendingCutscene.then; setPendingCutscene(null); t && t(); }}
        />
      )}

      {postModal && <PostBattleModal data={postModal} onClose={dismissPost} onNext={nextLevel} onRetry={retry} hasNext={!!window.OPPONENTS.find(o => o.id === postModal.opp.id + 1)} />}

      <ToastStack />
      {theoryCard && <TheoryCard opp={theoryCard.opp} onContinue={theoryCard.onContinue} />}

      <MobileNav onNav={nav} route={route.name} />

      <TweaksPanel title="Tweaks">
        <TweakSection label="Theme" />
        <TweakRadio
          label="Mode"
          value={t.theme}
          onChange={(v) => setTweak('theme', v)}
          options={['light', 'dark']}
        />
        <TweakSelect
          label="Accent"
          value={t.accent}
          onChange={(v) => setTweak('accent', v)}
          options={['brass', 'silver', 'crimson', 'forest']}
        />
        <TweakSection label="Typography" />
        <TweakRadio
          label="Style"
          value={t.typo}
          onChange={(v) => setTweak('typo', v)}
          options={['editorial', 'modern', 'manuscript']}
        />
      </TweaksPanel>
    </div>
  );
}

// =========================================================
// PLAYER SETUP — onboarding screen for new players
// =========================================================
function PlayerSetup({ onComplete }) {
  const [step, setStep] = React.useState(1); // 1=name, 2=style
  const [name, setName] = React.useState('');
  const [style, setStyle] = React.useState('');
  const styles = window.PLAYING_STYLES || [];

  if (step === 1) return (
    <div className="cutscene" style={{ background: 'var(--bg)' }}>
      <div style={{ maxWidth: 440, width: '100%', textAlign: 'center', padding: '0 24px' }}>
        <div style={{ fontFamily: 'var(--f-display)', fontSize: 80, lineHeight: 1, marginBottom: 12, color: 'var(--accent)' }}>♔</div>
        <div className="eyebrow accent" style={{ marginBottom: 8 }}>New Journey</div>
        <h1 className="display" style={{ fontSize: 'clamp(28px,7vw,52px)', margin: '0 0 8px' }}>What is your name?</h1>
        <p style={{ fontFamily: 'var(--f-display)', fontStyle: 'italic', color: 'var(--ink-soft)', fontSize: 17, marginBottom: 28, lineHeight: 1.5 }}>Your name will appear in every game, every journal entry, and every victory.</p>
        <input style={{ width:'100%', padding:'14px 18px', fontSize:20, fontFamily:'var(--f-display)', border:'1px solid var(--rule)', borderRadius:12, background:'var(--bg-elev)', color:'var(--ink)', outline:'none', textAlign:'center', letterSpacing:'-0.01em', boxSizing:'border-box' }}
          value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&name.trim()&&setStep(2)}
          placeholder="Your name…" autoFocus maxLength={20} />
        <button className="btn gold large" disabled={!name.trim()} onClick={()=>setStep(2)} style={{ marginTop:16, width:'100%', opacity:name.trim()?1:0.4 }}>Next →</button>
      </div>
    </div>
  );

  return (
    <div className="cutscene" style={{ background: 'var(--bg)', overflowY:'auto', alignItems:'flex-start', paddingTop:40 }}>
      <div style={{ maxWidth: 520, width: '100%', padding: '0 20px 40px', margin:'0 auto' }}>
        <div className="eyebrow accent" style={{ marginBottom: 8, textAlign:'center' }}>One more thing, {name}</div>
        <h1 className="display" style={{ fontSize: 'clamp(26px,6vw,44px)', margin: '0 0 6px', textAlign:'center' }}>How do you like to play?</h1>
        <p style={{ fontFamily:'var(--f-display)', fontStyle:'italic', color:'var(--ink-soft)', fontSize:16, marginBottom:24, lineHeight:1.5, textAlign:'center' }}>This shapes your training path and drill recommendations. You can always change it later in Profile.</p>
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {styles.map(s => (
            <button key={s.id} onClick={()=>setStyle(s.id)} style={{ display:'flex', alignItems:'center', gap:14, padding:'16px 18px', borderRadius:14, border:'2px solid '+(style===s.id?'var(--accent)':'var(--rule)'), background:style===s.id?'color-mix(in oklab, var(--accent) 8%, var(--bg-elev))':'var(--bg-elev)', cursor:'pointer', textAlign:'left', transition:'all .15s', WebkitTapHighlightColor:'transparent' }}>
              <span style={{ fontSize:32 }}>{s.glyph}</span>
              <div>
                <div style={{ fontFamily:'var(--f-display)', fontWeight:500, fontSize:19 }}>{s.name}</div>
                <div style={{ fontFamily:'var(--f-display)', fontStyle:'italic', fontSize:14, color:'var(--ink-soft)', marginTop:2 }}>{s.desc}</div>
              </div>
              {style===s.id&&<span style={{ marginLeft:'auto', color:'var(--accent)', fontSize:20 }}>✓</span>}
            </button>
          ))}
        </div>
        <button className="btn gold large" disabled={!style} onClick={()=>onComplete(name.trim(), style)} style={{ marginTop:20, width:'100%', opacity:style?1:0.4 }}>
          Begin the Odysseia →
        </button>
      </div>
    </div>
  );
}

// =========================================================
// TOP BAR
// =========================================================
function TopBar({ player, onNav, t, setTweak, onCheat }) {
  // Mobile cheat: tap logo 5× within 2s
  const tapRef = React.useRef({ count: 0, timer: null });
  function handleBrandTap() {
    tapRef.current.count++;
    if (tapRef.current.timer) clearTimeout(tapRef.current.timer);
    if (tapRef.current.count >= 5) {
      tapRef.current.count = 0;
      onCheat && onCheat();
      return;
    }
    tapRef.current.timer = setTimeout(() => { tapRef.current.count = 0; }, 2000);
    onNav('hub');
  }

  return (
    <div className="topbar">
      <button className="brand" onClick={handleBrandTap} style={{ background:'none', border:0, padding:0, WebkitTapHighlightColor:'transparent' }} aria-label="Home">
        <div className="mark">M</div>
        <span>ChessMind</span>
        <small>Odysseia · v3</small>
      </button>
      <div className="spacer"></div>
      <div className="tb-actions">
        <IconBtn title={t.theme === 'dark' ? 'Switch to light' : 'Switch to dark'} onClick={() => setTweak('theme', t.theme === 'dark' ? 'light' : 'dark')}>
          {t.theme === 'dark' ? (
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">
              <circle cx="12" cy="12" r="4.5" />
              <line x1="12" y1="2" x2="12" y2="5" /><line x1="12" y1="19" x2="12" y2="22" />
              <line x1="2" y1="12" x2="5" y2="12" /><line x1="19" y1="12" x2="22" y2="12" />
              <line x1="4.5" y1="4.5" x2="6.6" y2="6.6" /><line x1="17.4" y1="17.4" x2="19.5" y2="19.5" />
              <line x1="4.5" y1="19.5" x2="6.6" y2="17.4" /><line x1="17.4" y1="6.6" x2="19.5" y2="4.5" />
            </svg>
          ) : (
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.8">
              <path d="M21 12.8 A 9 9 0 0 1 11.2 3 A 7.5 7.5 0 1 0 21 12.8 Z" strokeLinejoin="round" />
            </svg>
          )}
        </IconBtn>
        <IconBtn title="Statistics" onClick={() => onNav('stats')}>
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">
            <line x1="6" y1="20" x2="6" y2="12" /><line x1="12" y1="20" x2="12" y2="6" />
            <line x1="18" y1="20" x2="18" y2="14" /><line x1="3" y1="20" x2="21" y2="20" />
          </svg>
        </IconBtn>
        <div className="avatar-chip" onClick={() => onNav('stats')}>
          <div className="av-img" style={{ background:'transparent', padding: 0 }}>
            <div style={{ width: 30, height: 30, borderRadius: '50%', overflow:'hidden', background: 'var(--bg-inset)' }}>
              <ChessPieceAvatar kind={player.avatar.piece} palette={player.avatar.palette} />
            </div>
          </div>
          <div className="av-meta">
            <div className="av-name">{player.name.split(' ')[0]}</div>
            <div className="av-title">Elo {player.elo}</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// =========================================================
// POST-BATTLE MODAL
// =========================================================
function PostBattleModal({ data, onClose, onNext, onRetry, hasNext }) {
  const xpVal = useCountUp(data.xp, 1000);
  const eloChange = data.eloChange != null ? data.eloChange : (data.won ? 25 : -10);

  return (
    <div className="cutscene" onClick={onClose}>
      <div
        style={{
          maxWidth: 540, width: '100%',
          background: 'var(--bg-elev)',
          border: '1px solid var(--rule)',
          borderRadius: 24,
          padding: 40,
          textAlign:'center',
          animation: 'slideUp 0.5s cubic-bezier(0.22,1,0.36,1)'
        }}
        onClick={e => e.stopPropagation()}
      >
        <div style={{ width: 80, height: 80, borderRadius: '50%', margin: '0 auto 16px', overflow:'hidden', border:'2px solid var(--accent)' }}>
          <Portrait data={data.opp} />
        </div>
        <Eyebrow accent>{data.won ? 'Victory' : 'Defeat'}</Eyebrow>
        <h2 className="display" style={{ fontSize: 36, fontWeight: 500, margin: '8px 0 4px', letterSpacing:'-0.012em' }}>
          {data.won ? `You defeated ${data.opp.name}.` : `${data.opp.name} prevails.`}
        </h2>
        <div style={{ fontFamily:'var(--f-display)', fontStyle:'italic', color:'var(--ink-soft)', fontSize: 17, marginBottom: 24 }}>
          "{data.opp.quote}"
        </div>

        {data.won && (
          <div style={{ display:'flex', justifyContent:'center', gap: 8, marginBottom: 20 }}>
            {[1,2,3].map(i => (
              <div key={i} style={{
                width: 36, height: 36,
                display:'grid', placeItems:'center',
                animation: `pop 0.5s ${0.3 + i * 0.15}s both cubic-bezier(0.22,1,0.36,1)`,
                opacity: 0
              }}>
                <Stars count={i <= data.stars ? 1 : 0} max={1} />
              </div>
            ))}
          </div>
        )}

        <div style={{ display:'grid', gridTemplateColumns: '1fr 1fr', gap: 12, margin: '24px 0' }}>
          <div style={{ padding: 16, background:'var(--bg-inset)', borderRadius: 14 }}>
            <Eyebrow>XP earned</Eyebrow>
            <div className="display" style={{ fontSize: 28, fontWeight: 500, marginTop: 4 }}>+{xpVal}</div>
          </div>
          <div style={{ padding: 16, background:'var(--bg-inset)', borderRadius: 14 }}>
            <Eyebrow>Elo change</Eyebrow>
            <div className="display" style={{ fontSize: 28, fontWeight: 500, marginTop: 4, color: eloChange > 0 ? 'var(--jade)' : 'var(--crimson)' }}>
              {eloChange > 0 ? '+' : ''}{eloChange}
            </div>
          </div>
        </div>

        {data.newUnlock && (
          <div style={{ padding: 16, background:'linear-gradient(180deg, var(--accent-soft) 0%, var(--bg-inset) 100%)', borderRadius: 14, marginBottom: 20 }}>
            <Eyebrow accent>Unlocked</Eyebrow>
            <div className="display" style={{ fontSize: 20, fontWeight: 500, marginTop: 4 }}>
              ✦ {capitalize(data.newUnlock)} board theme
            </div>
          </div>
        )}

        {data.newAct && (
          <div style={{ padding: 16, background:'var(--ink)', color:'var(--bg)', borderRadius: 14, marginBottom: 20 }}>
            <div style={{ fontFamily:'var(--f-mono)', fontSize: 10, letterSpacing:'0.18em', textTransform:'uppercase', color:'var(--accent)' }}>
              Next chapter
            </div>
            <div className="display" style={{ fontSize: 22, fontWeight: 500, marginTop: 4 }}>
              Act {data.newAct.num} · <em style={{ fontStyle:'italic' }}>{data.newAct.title}</em>
            </div>
          </div>
        )}

        <div style={{ display:'flex', gap: 8, flexWrap:'wrap', justifyContent:'center', marginTop: 24 }}>
          <button className="btn ghost" onClick={onRetry}>↺ Retry</button>
          <button className="btn ghost" onClick={onClose}>Back to map</button>
          {data.won && hasNext && <button className="btn gold" onClick={onNext}>Next opponent →</button>}
        </div>
      </div>

      <style dangerouslySetInnerHTML={{ __html: `
        @keyframes pop {
          0% { transform: scale(0); opacity: 0; }
          70% { transform: scale(1.2); opacity: 1; }
          100% { transform: scale(1); opacity: 1; }
        }
      `}} />
    </div>
  );
}

function capitalize(s) { return s ? s[0].toUpperCase() + s.slice(1) : s; }

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
